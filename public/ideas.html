<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ideas Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface-2: #222240;
      --surface-3: #2a2a4a;
      --accent: #6c5ce7;
      --accent-light: #a29bfe;
      --accent-glow: rgba(108, 92, 231, 0.3);
      --green: #00b894;
      --green-glow: rgba(0, 184, 148, 0.2);
      --amber: #fdcb6e;
      --amber-glow: rgba(253, 203, 110, 0.2);
      --red: #e17055;
      --red-glow: rgba(225, 112, 85, 0.2);
      --blue: #74b9ff;
      --text: #dfe6e9;
      --text-dim: #636e72;
      --text-muted: #4a5568;
      --border: rgba(255,255,255,0.06);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(108,92,231,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(0,184,148,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(116,185,255,0.05) 0%, transparent 50%);
      z-index: 0;
      animation: bgShift 20s ease-in-out infinite;
    }
    @keyframes bgShift {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* Top nav */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      background: rgba(15,15,26,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .back-btn:hover { color: var(--text); background: var(--surface); }
    .topbar h1 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-light), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.3px;
    }
    .topbar-actions {
      display: flex;
      gap: 10px;
    }

    /* Buttons */
    .btn {
      padding: 9px 18px;
      border-radius: var(--radius-sm);
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
      box-shadow: 0 2px 12px var(--accent-glow);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px var(--accent-glow); }
    .btn-generate {
      background: linear-gradient(135deg, var(--green), #00cec9);
      color: #fff;
      box-shadow: 0 2px 12px var(--green-glow);
    }
    .btn-generate:hover { transform: translateY(-1px); box-shadow: 0 4px 20px var(--green-glow); }
    .btn-secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--surface-3); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    /* Stats bar */
    .stats-bar {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 16px;
      padding: 20px 28px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 22px;
      flex: 1;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .stat-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .stat-icon.pending { background: var(--amber-glow); }
    .stat-icon.enriched { background: var(--green-glow); }
    .stat-icon.failed { background: var(--red-glow); }
    .stat-icon.total { background: var(--accent-glow); }
    .stat-number { font-size: 28px; font-weight: 700; }
    .stat-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

    /* Tabs */
    .tabs {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 4px;
      padding: 0 28px;
      margin-bottom: 20px;
    }
    .tab {
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab:hover { color: var(--text); background: var(--surface); }
    .tab.active { color: #fff; background: var(--accent); }

    /* Ideas grid */
    .ideas-container {
      position: relative;
      z-index: 1;
      padding: 0 28px 40px;
    }
    .ideas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 16px;
    }
    .idea-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }
    .idea-card:hover {
      border-color: rgba(108,92,231,0.3);
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
      transform: translateY(-2px);
    }
    .idea-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
    }
    .idea-card.status-pending::before { background: linear-gradient(90deg, var(--amber), #e17055); }
    .idea-card.status-enriched::before { background: linear-gradient(90deg, var(--green), var(--blue)); }
    .idea-card.status-failed::before { background: var(--red); }
    .idea-card.status-processing::before { background: linear-gradient(90deg, var(--blue), var(--accent)); animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

    .idea-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .idea-title {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.3;
      flex: 1;
    }
    .idea-delete {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px 6px;
      border-radius: 6px;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .idea-delete:hover { color: var(--red); background: var(--red-glow); }
    .idea-desc {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .idea-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .badge-pending { background: var(--amber-glow); color: var(--amber); }
    .badge-processing { background: rgba(116,185,255,0.2); color: var(--blue); }
    .badge-enriched { background: var(--green-glow); color: var(--green); }
    .badge-failed { background: var(--red-glow); color: var(--red); }
    .badge-category { background: var(--surface-3); color: var(--text-dim); }
    .badge-date { background: transparent; color: var(--text-muted); font-weight: 400; }
    .badge-effort { background: var(--accent-glow); color: var(--accent-light); }

    /* Enriched content */
    .enriched-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .enriched-block {
      margin-bottom: 14px;
    }
    .enriched-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--accent-light);
      margin-bottom: 6px;
    }
    .enriched-text {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
    }
    .enriched-text br + br { display: none; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text-dim); }
    .empty-state p { font-size: 14px; }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      width: 90%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      animation: slideUp 0.3s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } }
    .modal-card h2 {
      font-size: 18px;
      margin-bottom: 20px;
    }
    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .field input, .field textarea {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field textarea:focus {
      border-color: var(--accent);
    }
    .field input::placeholder, .field textarea::placeholder {
      color: var(--text-muted);
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    /* Theorize button */
    .btn-theorize {
      background: linear-gradient(135deg, #e17055, #fdcb6e);
      color: #fff;
      box-shadow: 0 2px 12px rgba(225,112,85,0.3);
      font-size: 12px;
      padding: 6px 14px;
    }
    .btn-theorize:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(225,112,85,0.4); }
    .btn-theorize:disabled { background: var(--surface-3); color: var(--text-muted); box-shadow: none; }

    /* Theorize progress bar */
    .theorize-progress {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .progress-bar-bg {
      height: 6px;
      background: var(--surface-3);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 6px;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 3px;
      transition: width 0.5s ease;
    }
    .progress-label {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between;
    }

    /* Theory viewer overlay */
    .theory-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      animation: fadeIn 0.2s;
    }
    .theory-sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 0;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .theory-sidebar h3 {
      padding: 0 20px;
      font-size: 14px;
      margin-bottom: 16px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .theory-nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.2s;
      border-left: 3px solid transparent;
      font-size: 13px;
      color: var(--text-dim);
    }
    .theory-nav-item:hover { background: var(--surface-2); color: var(--text); }
    .theory-nav-item.active {
      background: var(--surface-2);
      border-left-color: var(--accent);
      color: var(--text);
      font-weight: 600;
    }
    .theory-nav-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--surface-3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .theory-nav-item.active .theory-nav-num {
      background: var(--accent);
      color: #fff;
    }
    .theory-content {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px;
    }
    .theory-content h2 {
      font-size: 22px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent-light), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .theory-content .pass-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 20px;
    }
    .theory-body {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text);
      white-space: pre-wrap;
    }
    .theory-body h1, .theory-body h2, .theory-body h3 {
      color: var(--accent-light);
      margin: 20px 0 10px;
    }
    .theory-close {
      position: absolute;
      top: 16px;
      right: 20px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 210;
      transition: all 0.2s;
    }
    .theory-close:hover { background: var(--red-glow); color: var(--red); }

    /* Persona badge in nav */
    .theory-nav-item .persona-icon { font-size: 16px; }
    .theory-nav-item.persona { border-left-color: transparent; }
    .theory-nav-item.persona.active { border-left-color: #fdcb6e; }
    .theory-nav-item.persona .theory-nav-num { background: rgba(253,203,110,0.2); color: var(--amber); }
    .theory-nav-item.persona.active .theory-nav-num { background: #fdcb6e; color: #1a1a2e; }
    .theory-nav-item.suggestions { border-left-color: transparent; }
    .theory-nav-item.suggestions.active { border-left-color: var(--green); }
    .theory-nav-item.suggestions .theory-nav-num { background: var(--green-glow); color: var(--green); }
    .theory-nav-item.suggestions.active .theory-nav-num { background: var(--green); color: #fff; }

    /* Section dividers in nav */
    .theory-nav-divider {
      padding: 14px 20px 6px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }

    /* Action bar in theory viewer */
    .theory-actions {
      display: flex;
      gap: 10px;
      padding: 16px 40px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .theory-actions .btn { flex: 1; justify-content: center; }

    /* Suggestions panel */
    .suggestions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }
    .suggestion-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      transition: all 0.2s;
      cursor: pointer;
      position: relative;
    }
    .suggestion-card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .suggestion-card.selected { border-color: var(--green); background: rgba(0,184,148,0.05); }
    .suggestion-card.selected::after {
      content: '\2713';
      position: absolute;
      top: 8px;
      right: 10px;
      color: var(--green);
      font-weight: 700;
      font-size: 16px;
    }
    .suggestion-title { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
    .suggestion-desc { font-size: 12px; color: var(--text-dim); line-height: 1.5; margin-bottom: 8px; }
    .suggestion-meta { display: flex; gap: 6px; flex-wrap: wrap; }
    .suggestion-meta .badge { font-size: 10px; padding: 2px 8px; }

    /* Retheorize modal */
    .retheorize-textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px 14px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.6;
      outline: none;
      resize: vertical;
    }
    .retheorize-textarea:focus { border-color: var(--accent); }
    .selected-suggestions {
      margin-top: 12px;
      padding: 10px 14px;
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: var(--text-dim);
      max-height: 120px;
      overflow-y: auto;
    }
    .selected-suggestions li { margin-bottom: 4px; }

    @media (max-width: 768px) {
      .theory-sidebar { width: 200px; }
      .theory-content { padding: 20px; }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .stats-bar { flex-wrap: wrap; padding: 12px 16px; gap: 10px; }
      .stat-card { min-width: calc(50% - 8px); flex: unset; padding: 12px 16px; }
      .ideas-grid { grid-template-columns: 1fr; }
      .topbar { padding: 12px 16px; }
      .tabs { padding: 0 16px; }
      .ideas-container { padding: 0 16px 30px; }
      .topbar-actions { gap: 6px; }
      .btn { padding: 7px 12px; font-size: 12px; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <a href="/dashboard" class="back-btn">&larr; Dashboard</a>
      <h1>Ideas Lab</h1>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-generate" id="generateBtn" onclick="handleGenerate()">
        <span>&#x1F916;</span> Generate
      </button>
      <button class="btn btn-secondary" id="processBtn" onclick="handleProcess()">
        <span>&#x2699;&#xFE0F;</span> Process Queue
      </button>
      <button class="btn btn-primary" onclick="openAddModal()">
        <span>+</span> New Idea
      </button>
    </div>
  </div>

  <div class="stats-bar" id="statsBar"></div>

  <div class="tabs" id="tabsBar"></div>

  <div class="ideas-container">
    <div class="ideas-grid" id="ideasGrid"></div>
  </div>

  <script>
    // Secret passthrough from dashboard URL
    const _secret = new URLSearchParams(window.location.search).get('secret') || '';
    function api(path) {
      return _secret ? `${path}${path.includes('?') ? '&' : '?'}secret=${encodeURIComponent(_secret)}` : path;
    }

    function esc(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    let allIdeas = [];
    let currentTab = 'all';

    async function loadIdeas() {
      try {
        const res = await fetch(api('/api/ideas'), { credentials: 'same-origin' });
        if (res.status === 401) { window.location.replace('/login'); return; }
        const json = await res.json();
        allIdeas = json.ideas || [];
      } catch (e) {
        console.error('Failed to load ideas:', e);
        allIdeas = [];
      }
      renderStats();
      renderTabs();
      renderIdeas();
      checkRunningTheorize();
    }

    function renderStats() {
      const pending = allIdeas.filter(i => i.status === 'pending' || i.status === 'processing').length;
      const enriched = allIdeas.filter(i => i.status === 'enriched').length;
      const failed = allIdeas.filter(i => i.status === 'failed').length;
      document.getElementById('statsBar').innerHTML = `
        <div class="stat-card">
          <div class="stat-icon total">&#x1F4A1;</div>
          <div><div class="stat-number">${allIdeas.length}</div><div class="stat-label">Total Ideas</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon pending">&#x23F3;</div>
          <div><div class="stat-number">${pending}</div><div class="stat-label">Pending</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon enriched">&#x2728;</div>
          <div><div class="stat-number">${enriched}</div><div class="stat-label">Enriched</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon failed">&#x26A0;</div>
          <div><div class="stat-number">${failed}</div><div class="stat-label">Failed</div></div>
        </div>
      `;
    }

    function renderTabs() {
      const counts = {
        all: allIdeas.length,
        pending: allIdeas.filter(i => i.status === 'pending' || i.status === 'processing').length,
        enriched: allIdeas.filter(i => i.status === 'enriched').length,
        failed: allIdeas.filter(i => i.status === 'failed').length,
      };
      document.getElementById('tabsBar').innerHTML = ['all', 'pending', 'enriched', 'failed']
        .filter(t => t === 'all' || counts[t] > 0)
        .map(t => `<button class="tab ${currentTab === t ? 'active' : ''}" onclick="switchTab('${t}')">${t.charAt(0).toUpperCase() + t.slice(1)} (${counts[t]})</button>`)
        .join('');
    }

    function switchTab(tab) {
      currentTab = tab;
      renderTabs();
      renderIdeas();
    }

    function renderIdeas() {
      let filtered = allIdeas;
      if (currentTab === 'pending') filtered = allIdeas.filter(i => i.status === 'pending' || i.status === 'processing');
      else if (currentTab !== 'all') filtered = allIdeas.filter(i => i.status === currentTab);

      const grid = document.getElementById('ideasGrid');
      if (!filtered.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
          <div class="icon">&#x1F4A1;</div>
          <h3>${currentTab === 'all' ? 'No ideas yet' : 'No ' + currentTab + ' ideas'}</h3>
          <p>${currentTab === 'all' ? 'Click "New Idea" or "Generate" to get started' : ''}</p>
        </div>`;
        return;
      }

      grid.innerHTML = filtered.map(idea => {
        const date = new Date(idea.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });

        let enrichedHtml = '';
        if (idea.status === 'enriched') {
          enrichedHtml = `<div class="enriched-section">
            ${idea.enriched_summary ? `<div class="enriched-block"><div class="enriched-label">Summary</div><div class="enriched-text">${esc(idea.enriched_summary)}</div></div>` : ''}
            ${idea.enriched_implementation ? `<div class="enriched-block"><div class="enriched-label">Implementation</div><div class="enriched-text">${esc(idea.enriched_implementation).replace(/\\n/g, '<br>').replace(/\n/g, '<br>')}</div></div>` : ''}
            ${idea.enriched_considerations ? `<div class="enriched-block"><div class="enriched-label">Considerations</div><div class="enriched-text">${esc(idea.enriched_considerations).replace(/\\n/g, '<br>').replace(/\n/g, '<br>')}</div></div>` : ''}
            ${idea.enriched_effort ? `<div class="idea-meta" style="margin-top:8px"><span class="badge badge-effort">${esc(idea.enriched_effort)}</span></div>` : ''}
          </div>`;
        }
        if (idea.status === 'failed' && idea.enriched_summary) {
          enrichedHtml = `<div class="enriched-section"><div class="enriched-text" style="color:var(--red)">${esc(idea.enriched_summary)}</div></div>`;
        }

        // Theorize button logic — available on enriched and pending ideas
        let theorizeBtn = '';
        if (idea.status === 'enriched' || idea.status === 'pending') {
          if (idea.theorize_status === 'running') {
            const pct = idea.theorize_progress ? Math.round((idea.theorize_progress / 7) * 100) : 0;
            theorizeBtn = `
              <div class="theorize-progress" id="tp-${idea.id}">
                <div class="progress-label">
                  <span>Theorizing...</span>
                  <span>Pass ${idea.theorize_progress || 0} / 7</span>
                </div>
                <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
              </div>`;
          } else if (idea.theorize_status === 'complete') {
            theorizeBtn = `
              <div style="margin-top:12px;display:flex;gap:8px">
                <button class="btn btn-theorize" onclick="openTheoryViewer('${idea.id}')">&#x1F4D6; View Theory</button>
                <button class="btn btn-secondary" style="font-size:12px;padding:6px 14px" onclick="handleTheorize('${idea.id}')">&#x1F504; Re-run</button>
              </div>`;
          } else if (idea.theorize_status === 'failed') {
            theorizeBtn = `
              <div style="margin-top:12px;display:flex;gap:8px;align-items:center">
                <button class="btn btn-theorize" onclick="handleTheorize('${idea.id}')">&#x1F9EA; Retry Theorize</button>
                <span style="font-size:11px;color:var(--red)">Failed</span>
              </div>`;
          } else {
            theorizeBtn = `<div style="margin-top:12px"><button class="btn btn-theorize" onclick="handleTheorize('${idea.id}')">&#x1F9EA; Theorize</button></div>`;
          }
        }

        return `<div class="idea-card status-${idea.status}" id="card-${idea.id}">
          <div class="idea-header">
            <div class="idea-title">${esc(idea.title)}</div>
            <button class="idea-delete" onclick="deleteIdea('${idea.id}')" title="Delete">&#x1F5D1;</button>
          </div>
          ${idea.description ? `<div class="idea-desc">${esc(idea.description)}</div>` : ''}
          <div class="idea-meta">
            <span class="badge badge-${idea.status}">${idea.status}</span>
            ${idea.category ? `<span class="badge badge-category">${esc(idea.category)}</span>` : ''}
            <span class="badge badge-date">${date}</span>
          </div>
          ${enrichedHtml}
          ${theorizeBtn}
        </div>`;
      }).join('');
    }

    async function deleteIdea(id) {
      await fetch(api(`/api/ideas/${id}`), { method: 'DELETE', credentials: 'same-origin' });
      loadIdeas();
    }

    async function handleGenerate() {
      const btn = document.getElementById('generateBtn');
      btn.disabled = true;
      btn.innerHTML = '<span>&#x1F916;</span> Analysing repo...';
      try {
        const res = await fetch(api('/api/ideas/generate'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ count: 5 }),
          credentials: 'same-origin',
        });
        const result = await res.json();
        btn.innerHTML = `<span>&#x2728;</span> Generated ${result.generated || 0}!`;
        setTimeout(() => { btn.innerHTML = '<span>&#x1F916;</span> Generate'; btn.disabled = false; }, 2000);
        loadIdeas();
      } catch {
        btn.innerHTML = '<span>&#x26A0;</span> Error';
        setTimeout(() => { btn.innerHTML = '<span>&#x1F916;</span> Generate'; btn.disabled = false; }, 2000);
      }
    }

    async function handleProcess() {
      const btn = document.getElementById('processBtn');
      btn.disabled = true;
      btn.innerHTML = '<span>&#x2699;&#xFE0F;</span> Processing...';
      try {
        const res = await fetch(api('/api/ideas/process'), { method: 'POST', credentials: 'same-origin' });
        const result = await res.json();
        btn.innerHTML = `<span>&#x2728;</span> Done! ${result.processed || 0} processed`;
        setTimeout(() => { btn.innerHTML = '<span>&#x2699;&#xFE0F;</span> Process Queue'; btn.disabled = false; }, 2000);
        loadIdeas();
      } catch {
        btn.innerHTML = '<span>&#x26A0;</span> Error';
        setTimeout(() => { btn.innerHTML = '<span>&#x2699;&#xFE0F;</span> Process Queue'; btn.disabled = false; }, 2000);
      }
    }

    function openAddModal() {
      const modal = document.createElement('div');
      modal.className = 'modal-backdrop';
      modal.innerHTML = `
        <div class="modal-card">
          <h2>&#x1F4A1; New Idea</h2>
          <div class="field">
            <label>Title</label>
            <input type="text" id="newTitle" placeholder="What's the idea?" autofocus>
          </div>
          <div class="field">
            <label>Description</label>
            <textarea id="newDesc" rows="3" placeholder="Any details or context..."></textarea>
          </div>
          <div class="field">
            <label>Category</label>
            <input type="text" id="newCategory" placeholder="e.g. Feature, Improvement, Fun...">
          </div>
          <div class="modal-actions">
            <button class="btn btn-secondary" onclick="this.closest('.modal-backdrop').remove()">Cancel</button>
            <button class="btn btn-primary" id="saveBtn" onclick="saveIdea()">Save Idea</button>
          </div>
        </div>`;
      document.body.appendChild(modal);
      modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
      setTimeout(() => document.getElementById('newTitle').focus(), 100);
    }

    async function saveIdea() {
      const title = document.getElementById('newTitle').value.trim();
      if (!title) { document.getElementById('newTitle').style.borderColor = 'var(--red)'; return; }
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = 'Saving...';
      await fetch(api('/api/ideas'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title,
          description: document.getElementById('newDesc').value.trim(),
          category: document.getElementById('newCategory').value.trim(),
        }),
        credentials: 'same-origin',
      });
      document.querySelector('.modal-backdrop').remove();
      loadIdeas();
    }

    // === Theorize ===
    const _pollingIds = new Set();

    async function handleTheorize(ideaId) {
      try {
        const res = await fetch(api(`/api/ideas/${ideaId}/theorize`), {
          method: 'POST',
          credentials: 'same-origin',
        });
        if (!res.ok) throw new Error('Failed to start');

        // Optimistically update the local idea
        const idea = allIdeas.find(i => i.id === ideaId);
        if (idea) {
          idea.theorize_status = 'running';
          idea.theorize_progress = 0;
          renderIdeas();
        }

        // Start polling for progress
        pollTheorize(ideaId);
      } catch (e) {
        console.error('Failed to start theorize:', e);
      }
    }

    function pollTheorize(ideaId) {
      if (_pollingIds.has(ideaId)) return;
      _pollingIds.add(ideaId);

      const interval = setInterval(async () => {
        try {
          const res = await fetch(api(`/api/ideas/${ideaId}/theories`), { credentials: 'same-origin' });
          const data = await res.json();

          // Update local idea state
          const idea = allIdeas.find(i => i.id === ideaId);
          if (idea) {
            idea.theorize_status = data.status;
            idea.theorize_progress = data.progress;
          }

          // Update card progress in-place (without re-rendering entire grid)
          const card = document.getElementById(`card-${ideaId}`);
          if (card && data.status === 'running') {
            const tp = document.getElementById(`tp-${ideaId}`);
            if (tp) {
              const pct = Math.round((data.progress / data.total_passes) * 100);
              tp.querySelector('.progress-label').innerHTML = `<span>Theorizing...</span><span>Pass ${data.progress} / ${data.total_passes}</span>`;
              tp.querySelector('.progress-bar-fill').style.width = `${pct}%`;
            }
          }

          // Done? Stop polling and re-render
          if (data.status === 'complete' || data.status === 'failed') {
            clearInterval(interval);
            _pollingIds.delete(ideaId);
            loadIdeas();
          }
        } catch (e) {
          console.error('Poll error:', e);
          clearInterval(interval);
          _pollingIds.delete(ideaId);
        }
      }, 3000);
    }

    async function openTheoryViewer(ideaId) {
      const idea = allIdeas.find(i => i.id === ideaId);
      if (!idea) return;

      // Fetch theories
      let theories = [];
      try {
        const res = await fetch(api(`/api/ideas/${ideaId}/theories`), { credentials: 'same-origin' });
        const data = await res.json();
        theories = data.theories || [];
      } catch (e) {
        console.error('Failed to load theories:', e);
        return;
      }

      if (!theories.length) {
        alert('No theories found. Try running Theorize first.');
        return;
      }

      // Build overlay
      const overlay = document.createElement('div');
      overlay.className = 'theory-overlay';
      overlay.id = 'theoryOverlay';

      // Group theories into sections
      const analysisTheories = theories.filter(t => t.pass_number <= 7);
      const personaTheories = theories.filter(t => t.pass_number >= 8 && t.pass_number <= 11);
      const improvementTheory = theories.find(t => t.pass_number === 12);

      const personaIcons = { 8: '👩', 9: '👨', 10: '👧', 11: '👦' };

      let navHtml = '';

      // Analysis section
      if (analysisTheories.length) {
        navHtml += '<div class="theory-nav-divider">Analysis</div>';
        navHtml += analysisTheories.map((t, idx) => `
          <div class="theory-nav-item ${idx === 0 ? 'active' : ''}" data-pass="${theories.indexOf(t)}" onclick="switchTheoryPass(${theories.indexOf(t)})">
            <div class="theory-nav-num">${t.pass_number}</div>
            <span>${esc(t.pass_name)}</span>
          </div>
        `).join('');
      }

      // Persona section
      if (personaTheories.length) {
        navHtml += '<div class="theory-nav-divider">Persona Tests</div>';
        navHtml += personaTheories.map(t => `
          <div class="theory-nav-item persona" data-pass="${theories.indexOf(t)}" onclick="switchTheoryPass(${theories.indexOf(t)})">
            <div class="theory-nav-num">${personaIcons[t.pass_number] || t.pass_number}</div>
            <span>${esc(t.pass_name.replace('Persona: ', ''))}</span>
          </div>
        `).join('');
      }

      // Improvements section
      if (improvementTheory) {
        navHtml += '<div class="theory-nav-divider">Synthesis</div>';
        navHtml += `
          <div class="theory-nav-item suggestions" data-pass="${theories.indexOf(improvementTheory)}" onclick="switchTheoryPass(${theories.indexOf(improvementTheory)})">
            <div class="theory-nav-num">&#x2728;</div>
            <span>Improvements</span>
          </div>
        `;
      }

      overlay.innerHTML = `
        <button class="theory-close" onclick="closeTheoryViewer()">&times;</button>
        <div class="theory-sidebar">
          <h3>${esc(idea.title)}</h3>
          ${navHtml}
        </div>
        <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
          <div class="theory-content" id="theoryContent" style="flex:1;overflow-y:auto">
            ${renderTheoryContent(theories[0], theories.length)}
          </div>
          <div class="theory-actions">
            <button class="btn btn-generate" onclick="handleSuggestImprovements('${ideaId}')">&#x1F4A1; Get AI Suggestions</button>
            <button class="btn btn-theorize" onclick="openRetheorizeModal('${ideaId}')">&#x1F504; Adjust & Retheorize</button>
          </div>
        </div>
      `;

      // Store theories for tab switching
      overlay._theories = theories;
      document.body.appendChild(overlay);
      document.body.style.overflow = 'hidden';

      // Close on Escape
      overlay._onKey = (e) => { if (e.key === 'Escape') closeTheoryViewer(); };
      document.addEventListener('keydown', overlay._onKey);
    }

    function renderTheoryContent(theory, totalPasses) {
      // Simple markdown-ish rendering
      let content = esc(theory.content)
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^- (.+)$/gm, '&#x2022; $1')
        .replace(/^\d+\.\s/gm, (m) => `<br>${m}`)
        .replace(/`([^`]+)`/g, '<code style="background:var(--surface-3);padding:2px 6px;border-radius:4px;font-size:12px">$1</code>');

      const total = totalPasses || document.getElementById('theoryOverlay')?._theories?.length || '?';

      // Section label
      let sectionLabel = 'Analysis';
      if (theory.pass_number >= 8 && theory.pass_number <= 11) sectionLabel = 'Persona Test';
      else if (theory.pass_number === 12) sectionLabel = 'Synthesis';

      return `
        <div class="pass-label">${sectionLabel} &middot; Pass ${theory.pass_number} of ${total}</div>
        <h2>${esc(theory.pass_name)}</h2>
        <div class="theory-body">${content}</div>
      `;
    }

    function switchTheoryPass(idx) {
      const overlay = document.getElementById('theoryOverlay');
      if (!overlay || !overlay._theories[idx]) return;

      // Update nav active state — match by data-pass attribute
      overlay.querySelectorAll('.theory-nav-item').forEach(el => {
        el.classList.toggle('active', parseInt(el.dataset.pass) === idx);
      });

      // Update content
      document.getElementById('theoryContent').innerHTML = renderTheoryContent(overlay._theories[idx], overlay._theories.length);
    }

    // === AI Suggestions ===
    let _currentSuggestions = [];

    async function handleSuggestImprovements(ideaId) {
      const contentEl = document.getElementById('theoryContent');
      if (!contentEl) return;

      contentEl.innerHTML = `
        <div class="pass-label">AI Analysis</div>
        <h2>Generating Improvement Suggestions...</h2>
        <div class="theory-body" style="text-align:center;padding:40px">
          <div style="font-size:40px;margin-bottom:16px">&#x1F9E0;</div>
          <p>Analysing all theories and persona feedback to suggest enhancements...</p>
          <div class="progress-bar-bg" style="max-width:300px;margin:20px auto">
            <div class="progress-bar-fill" style="width:60%;animation:shimmer 1.5s infinite"></div>
          </div>
        </div>
      `;

      // Deselect nav items
      document.querySelectorAll('.theory-nav-item').forEach(el => el.classList.remove('active'));

      try {
        const res = await fetch(api(`/api/ideas/${ideaId}/suggestions`), { credentials: 'same-origin' });
        const data = await res.json();
        _currentSuggestions = data.suggestions || [];

        if (!_currentSuggestions.length) {
          contentEl.innerHTML = `<div class="pass-label">AI Suggestions</div><h2>No suggestions generated</h2><div class="theory-body">Try running Theorize again with more passes completed.</div>`;
          return;
        }

        const effortColors = { quick: 'var(--green)', medium: 'var(--amber)', significant: 'var(--red)' };
        const impactColors = { high: 'var(--green)', medium: 'var(--amber)', low: 'var(--text-muted)' };

        contentEl.innerHTML = `
          <div class="pass-label">AI-Generated</div>
          <h2>Improvement Suggestions</h2>
          <p style="color:var(--text-dim);margin-bottom:16px;font-size:13px">Click suggestions to select them, then use "Adjust & Retheorize" to incorporate them into a new analysis.</p>
          <div class="suggestions-grid">
            ${_currentSuggestions.map((s, i) => `
              <div class="suggestion-card" onclick="toggleSuggestion(${i})" data-idx="${i}">
                <div class="suggestion-title">${esc(s.title)}</div>
                <div class="suggestion-desc">${esc(s.description)}</div>
                <div class="suggestion-meta">
                  <span class="badge" style="background:${effortColors[s.effort] || 'var(--surface-3)'}22;color:${effortColors[s.effort] || 'var(--text-dim)'}">${esc(s.effort || '?')}</span>
                  <span class="badge" style="background:${impactColors[s.impact] || 'var(--surface-3)'}22;color:${impactColors[s.impact] || 'var(--text-dim)'}">${esc(s.impact || '?')} impact</span>
                  ${(s.persona_appeal || []).map(p => `<span class="badge badge-category">${esc(p)}</span>`).join('')}
                </div>
              </div>
            `).join('')}
          </div>
        `;
      } catch (e) {
        console.error('Failed to get suggestions:', e);
        contentEl.innerHTML = `<div class="pass-label">Error</div><h2>Failed to generate suggestions</h2><div class="theory-body" style="color:var(--red)">${esc(e.message)}</div>`;
      }
    }

    const _selectedSuggestions = new Set();

    function toggleSuggestion(idx) {
      if (_selectedSuggestions.has(idx)) {
        _selectedSuggestions.delete(idx);
      } else {
        _selectedSuggestions.add(idx);
      }
      // Update UI
      document.querySelectorAll('.suggestion-card').forEach(el => {
        el.classList.toggle('selected', _selectedSuggestions.has(parseInt(el.dataset.idx)));
      });
    }

    // === Retheorize ===
    function openRetheorizeModal(ideaId) {
      // Gather selected suggestions text
      const selectedText = [..._selectedSuggestions]
        .map(i => _currentSuggestions[i])
        .filter(Boolean)
        .map(s => `- ${s.title}: ${s.description}`)
        .join('\n');

      const modal = document.createElement('div');
      modal.className = 'modal-backdrop';
      modal.innerHTML = `
        <div class="modal-card" style="max-width:560px">
          <h2>&#x1F504; Adjust & Retheorize</h2>
          <p style="font-size:13px;color:var(--text-dim);margin-bottom:16px">
            Describe what you want to change, add, or focus on. The AI will re-run all 12 passes with your adjustments in mind.
          </p>
          <div class="field">
            <label>Your Adjustments & Notes</label>
            <textarea class="retheorize-textarea" id="retheorizeNotes" placeholder="e.g. Focus more on the kids' experience, make it simpler, add gamification...">${selectedText ? 'Include these suggested improvements:\n' + selectedText + '\n\nAdditional notes:\n' : ''}</textarea>
          </div>
          ${selectedText ? `
            <div class="selected-suggestions">
              <strong>${_selectedSuggestions.size} suggestion(s) selected:</strong>
              <ul style="margin-top:4px;padding-left:16px">
                ${[..._selectedSuggestions].map(i => `<li>${esc(_currentSuggestions[i]?.title || '')}</li>`).join('')}
              </ul>
            </div>
          ` : ''}
          <div class="modal-actions">
            <button class="btn btn-secondary" onclick="this.closest('.modal-backdrop').remove()">Cancel</button>
            <button class="btn btn-theorize" id="retheorizeBtn" onclick="submitRetheorize('${ideaId}')">&#x1F680; Retheorize</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
      setTimeout(() => document.getElementById('retheorizeNotes').focus(), 100);
    }

    async function submitRetheorize(ideaId) {
      const notes = document.getElementById('retheorizeNotes').value.trim();
      if (!notes) {
        document.getElementById('retheorizeNotes').style.borderColor = 'var(--red)';
        return;
      }

      const btn = document.getElementById('retheorizeBtn');
      btn.disabled = true;
      btn.innerHTML = '&#x23F3; Starting...';

      try {
        const res = await fetch(api(`/api/ideas/${ideaId}/retheorize`), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adjustments: notes }),
          credentials: 'same-origin',
        });
        if (!res.ok) throw new Error('Failed to start retheorize');

        // Close modal and theory viewer
        document.querySelector('.modal-backdrop')?.remove();
        closeTheoryViewer();

        // Update local state and start polling
        const idea = allIdeas.find(i => i.id === ideaId);
        if (idea) {
          idea.theorize_status = 'running';
          idea.theorize_progress = 0;
          renderIdeas();
        }

        _selectedSuggestions.clear();
        _currentSuggestions = [];
        pollTheorize(ideaId);
      } catch (e) {
        console.error('Failed to start retheorize:', e);
        btn.disabled = false;
        btn.innerHTML = '&#x1F680; Retheorize';
      }
    }

    function closeTheoryViewer() {
      const overlay = document.getElementById('theoryOverlay');
      if (overlay) {
        if (overlay._onKey) document.removeEventListener('keydown', overlay._onKey);
        overlay.remove();
        document.body.style.overflow = '';
      }
    }

    // On load, check for any running theorize jobs and start polling them
    function checkRunningTheorize() {
      allIdeas.filter(i => i.theorize_status === 'running').forEach(i => pollTheorize(i.id));
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      if (e.key === 'n' && !e.ctrlKey && !e.metaKey && !document.querySelector('.modal-backdrop') && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
        openAddModal();
      }
    });

    // Init
    loadIdeas();
  </script>
</body>
</html>
