      --primary-light: #e3ecff;

    /* ============ BASE STYLES ============ */

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      transition: background 0.5s ease, color 0.3s ease;
    }

    /* === TV LAYOUT: fill viewport exactly === */
    .dashboard {
      height: 100vh;
      padding: 12px;
      display: grid;
      grid-template-columns: 220px 1fr 1fr 1fr;
      grid-template-rows: auto auto 1fr 1fr;
      gap: 12px;
      grid-template-areas:
        "sidebar header    header    header"
        "sidebar countdown countdown countdown"
        "sidebar today     upcoming  lists"
        "sidebar meals     meals     reminders";
    }

    /* Cards */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: background 0.3s ease;
    }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-light);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .card-title .icon { font-size: 16px; }

    .card-body {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .card-body::-webkit-scrollbar { width: 3px; }
    .card-body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    /* === SIDEBAR === */
    .sidebar {
      grid-area: sidebar;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .profile-card {
      text-align: center;
      padding: 16px 12px;
      background: var(--header-gradient);
      color: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .profile-card .family-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .profile-card .subtitle {
      font-size: 11px;
      opacity: 0.85;
    }

    .profile-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .clock-card {
      text-align: center;
      padding: 10px;
    }

    .clock-time {
      font-size: 34px;
      font-weight: 200;
      color: var(--primary);
      letter-spacing: -1px;
    }

    .clock-date {
      font-size: 11px;
      color: var(--text-light);
      margin-top: 2px;
    }

    /* === KID POINTS (in sidebar) === */
    .kid-points-card {
      border-radius: var(--radius);
      padding: 14px;
      text-align: center;
      color: white;
      box-shadow: var(--shadow);
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .kid-points-card .kid-sparkles {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
    }

    .kid-points-card .kid-sparkle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      animation: kid-twinkle 2s infinite ease-in-out;
    }

    @keyframes kid-twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(2); }
    }

    .kid-points-card.sam {
      background: linear-gradient(135deg, #11998e, #38ef7d);
    }

    .kid-points-card.robyn {
      background: linear-gradient(135deg, #f093fb, #f5576c);
    }

    .kid-points-card.default-kid {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .kid-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
      position: relative;
    }

    .mickey-heads {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 6px;
      min-height: 28px;
      align-items: center;
      position: relative;
    }

    /* Sam: black Mickey heads */
    .mickey-head {
      width: 28px;
      height: 28px;
      position: relative;
      display: inline-block;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
    }

    .mickey-head .head {
      width: 18px;
      height: 18px;
      background: #1a1a1a;
      border-radius: 50%;
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    .mickey-head .ear-left,
    .mickey-head .ear-right {
      width: 11px;
      height: 11px;
      background: #1a1a1a;
      border-radius: 50%;
      position: absolute;
      top: 0;
    }

    .mickey-head .ear-left { left: 1px; }
    .mickey-head .ear-right { right: 1px; }

    /* Robyn: pink Minnie heads with bow */
    .minnie-head {
      width: 28px;
      height: 30px;
      position: relative;
      display: inline-block;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
    }

    .minnie-head .head {
      width: 18px;
      height: 18px;
      background: #1a1a1a;
      border-radius: 50%;
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    .minnie-head .ear-left,
    .minnie-head .ear-right {
      width: 11px;
      height: 11px;
      background: #1a1a1a;
      border-radius: 50%;
      position: absolute;
      top: 4px;
    }

    .minnie-head .ear-left { left: 1px; }
    .minnie-head .ear-right { right: 1px; }

    .minnie-head .bow {
      position: absolute;
      top: -1px;
      right: -2px;
      width: 16px;
      height: 10px;
      z-index: 1;
    }

    .minnie-head .bow-left,
    .minnie-head .bow-right {
      position: absolute;
      width: 8px;
      height: 6px;
      background: #ff69b4;
      border-radius: 50%;
      top: 0;
    }

    .minnie-head .bow-left { left: 0; transform: rotate(-15deg); }
    .minnie-head .bow-right { right: 0; transform: rotate(15deg); }

    .minnie-head .bow-center {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #ff1493;
      border-radius: 50%;
      top: 1px;
      left: 50%;
      transform: translateX(-50%);
    }

    .points-total {
      font-size: 32px;
      font-weight: 800;
      text-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }

    .points-label {
      font-size: 10px;
      opacity: 0.85;
      margin-top: 1px;
    }

    .points-progress {
      margin-top: 8px;
    }

    .progress-bar-track {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.25);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--mickey-gold);
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .progress-label {
      font-size: 9px;
      opacity: 0.8;
      margin-top: 3px;
    }

    .points-empty-msg {
      font-size: 11px;
      opacity: 0.8;
    }

    .points-adjust {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 8px;
      position: relative;
    }

    .points-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      line-height: 1;
    }

    .points-btn:hover {
      background: rgba(255,255,255,0.35);
      border-color: rgba(255,255,255,0.8);
      transform: scale(1.1);
    }

    .points-btn:active {
      transform: scale(0.95);
    }

    .points-btn.btn-minus { font-size: 18px; }

    .points-toast {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      font-weight: 700;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
      animation: points-float 0.8s ease-out forwards;
      pointer-events: none;
    }

    @keyframes points-float {
      0% { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-24px); }
    }

    /* === WEATHER === */
    .weather-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 10px;
      box-shadow: var(--shadow);
    }

    .weather-title {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-light);
      margin-bottom: 6px;
      text-align: center;
    }

    .weather-days {
      display: flex;
      justify-content: space-between;
      gap: 2px;
    }

    .weather-day {
      flex: 1;
      text-align: center;
    }

    .weather-day-name {
      font-size: 9px;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
    }

    .weather-day-icon {
      font-size: 20px;
      margin: 2px 0;
    }

    .weather-day-temp {
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
    }

    .weather-day-low {
      font-size: 9px;
      color: var(--text-light);
    }

    /* === HEADER === */
    .header {
      grid-area: header;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .header .theme-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 12px;
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 600;
      margin-left: 10px;
    }

    .header .updated {
      font-size: 11px;
      color: var(--text-light);
    }

    .live-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
      margin-right: 4px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* === COUNTDOWN === */
    .countdown-area {
      grid-area: countdown;
      display: flex;
      flex-direction: row;
      gap: 10px;
    }

    .countdown-card {
      flex: 1;
      border-radius: var(--radius);
      padding: 10px 14px;
      text-align: center;
      color: white;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .countdown-card .sparkles {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .countdown-card .sparkle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: sparkle-float 3s infinite ease-in-out;
    }

    @keyframes sparkle-float {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
      50% { transform: translateY(-15px) scale(1.5); opacity: 1; }
    }

    .countdown-title {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 2px;
      position: relative;
    }

    .countdown-days {
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      position: relative;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .countdown-label {
      font-size: 10px;
      font-weight: 500;
      opacity: 0.9;
      margin-top: 1px;
      position: relative;
    }

    .countdown-date {
      font-size: 9px;
      opacity: 0.75;
      margin-top: 2px;
      position: relative;
    }

    .countdown-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      color: var(--text-light);
      font-size: 13px;
    }

    /* Countdown backgrounds */
    .bg-fireworks { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); }
    .bg-castle { background: linear-gradient(135deg, #1b1464, #6c3ec1, #c86dd7); }
    .bg-stars { background: linear-gradient(135deg, #0c0c1d, #1a1a3e, #2d2b55); }
    .bg-rainbow { background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3); }
    .bg-beach { background: linear-gradient(135deg, #0abde3, #48dbfb, #feca57); }
    .bg-party { background: linear-gradient(135deg, #ff6348, #ff9ff3, #feca57, #48dbfb); }

    /* === TODAY === */
    .today-card { grid-area: today; }

    .event-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .event-item:last-child { border-bottom: none; }

    .event-time-badge {
      background: var(--primary-light);
      color: var(--primary);
      font-size: 10px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 6px;
      white-space: nowrap;
      min-width: 65px;
      text-align: center;
    }

    .event-time-badge.all-day {
      background: var(--accent-light);
      color: var(--accent);
    }

    .event-details h3 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 1px;
    }

    .event-details p {
      font-size: 11px;
      color: var(--text-light);
    }

    .event-item.passed { opacity: 0.45; }
    .event-item.passed .event-details h3 { text-decoration: line-through; }
    .event-item.passed .event-time-badge { background: var(--border); color: var(--text-light); }

    .empty-state {
      text-align: center;
      padding: 20px 10px;
      color: var(--text-light);
      font-size: 13px;
    }

    .empty-state .icon {
      font-size: 28px;
      margin-bottom: 8px;
      opacity: 0.5;
    }

    /* === UPCOMING === */
    .upcoming-card { grid-area: upcoming; }
    .upcoming-card .card-title { display: flex; align-items: center; gap: 8px; }

    .day-group { margin-bottom: 10px; }
    .day-group:last-child { margin-bottom: 0; }

    .day-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      padding-bottom: 2px;
      border-bottom: 2px solid var(--primary-light);
    }

    .day-event {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 12px;
    }

    .day-event.past-event {
      opacity: 0.5;
      text-decoration: line-through;
    }

    .day-event .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
      flex-shrink: 0;
    }

    .day-event.past-event .dot {
      background: var(--text-light);
    }

    .day-event .time {
      font-size: 10px;
      color: var(--text-light);
      min-width: 60px;
    }


    /* === MEALS === */
    .meals-card { grid-area: meals; }

    .meal-slot {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }

    .meal-slot:last-child { border-bottom: none; }

    .meal-type-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      min-width: 60px;
      text-align: center;
      text-transform: capitalize;
    }

    .meal-type-breakfast { background: #fff9c4; color: #f57f17; }
    .meal-type-lunch { background: #c8e6c9; color: #2e7d32; }
    .meal-type-dinner { background: #e1bee7; color: #7b1fa2; }
    .meal-type-snack { background: #ffe0b2; color: #e65100; }

    .meal-info h4 {
      font-size: 13px;
      font-weight: 600;
    }

    .meal-info .meal-notes {
      font-size: 10px;
      color: var(--text-light);
      font-style: italic;
    }

    .meal-slot { position: relative; }

    .meal-actions {
      display: flex;
      gap: 4px;
      margin-left: auto;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .meal-slot:hover .meal-actions { opacity: 1; }

    @keyframes slideOutRight {
      0% { opacity: 1; transform: translateX(0); max-height: 60px; }
      60% { opacity: 0; transform: translateX(80px); max-height: 60px; }
      100% { opacity: 0; transform: translateX(80px); max-height: 0; padding: 0; margin: 0; border: none; overflow: hidden; }
    }
    .meal-slot.removing {
      animation: slideOutRight 0.4s ease forwards;
      pointer-events: none;
    }

    .meal-action-btn {
      background: none;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      padding: 2px 6px;
      font-size: 10px;
      color: var(--text-light);
      opacity: 0.3;
      transition: all 0.15s;
    }

    .meal-action-btn:hover {
      opacity: 1;
      background: var(--primary-light);
      color: var(--primary);
    }

    .meal-action-btn.delete:hover {
      background: #fee;
      color: #c00;
    }

    .card-add-btn {
      display: inline-block;
      margin-left: auto;
      padding: 2px 8px;
      border: 1px dashed var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text-light);
      font-size: 10px;
      cursor: pointer;
      opacity: 0;
      transition: all 0.15s;
    }

    .card:hover .card-add-btn { opacity: 0.5; }

    .card-add-btn:hover {
      opacity: 1 !important;
      color: var(--primary);
      background: var(--primary-light);
      border-color: var(--primary);
    }

    /* Generic modal (shared by meals, events, lists, reminders) */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(2px);
    }

    .modal {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      width: 340px;
      max-width: 90vw;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .modal h3 {
      margin-bottom: 14px;
      color: var(--text);
      font-size: 16px;
    }

    .modal label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .modal input,
    .modal select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
      background: var(--card);
      color: var(--text);
    }

    .modal input:focus,
    .modal select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(74,122,247,0.15);
    }

    .modal-buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .modal-buttons button {
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-cancel {
      background: var(--border);
      color: var(--text);
    }

    .btn-save {
      background: var(--primary);
      color: white;
    }

    .btn-save:hover { filter: brightness(1.1); }
    .btn-cancel:hover { background: #ccc; }

    /* Meal picker wheel */
    .wheel-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(4px);
    }

    .wheel-container {
      background: var(--card);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      max-width: 340px;
      width: 90vw;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .wheel-container h3 {
      margin-bottom: 16px;
      font-size: 18px;
      color: var(--text);
    }

    .wheel-display {
      position: relative;
      height: 180px;
      overflow: hidden;
      border-radius: 12px;
      background: var(--bg);
      margin-bottom: 16px;
    }

    .wheel-items {
      position: absolute;
      width: 100%;
      transition: transform 3s cubic-bezier(0.17, 0.67, 0.12, 0.99);
    }

    .wheel-item {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }

    .wheel-item.highlight {
      background: var(--primary);
      color: white;
      font-size: 18px;
      border-radius: 8px;
      border: none;
    }

    .wheel-pointer {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 60px;
      margin-top: -30px;
      border-top: 3px solid var(--primary);
      border-bottom: 3px solid var(--primary);
      pointer-events: none;
      z-index: 1;
    }

    .wheel-result {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      margin: 12px 0;
      min-height: 36px;
    }

    .wheel-buttons {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 12px;
    }

    .wheel-buttons button {
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-spin {
      background: var(--primary);
      color: white;
    }
    .btn-spin:hover { filter: brightness(1.1); }
    .btn-spin:disabled { opacity: 0.5; cursor: not-allowed; }

    .meal-picker-btn {
      background: none;
      border: 1px dashed var(--border) !important;
      color: var(--text-light);
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .meal-picker-btn:hover {
      border-color: var(--primary) !important;
      color: var(--primary);
    }

    /* Settings panel */
    .settings-btn {
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      border: none;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      z-index: 9998;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }
    .settings-btn:hover { transform: scale(1.1); }

    .settings-panel {
      position: fixed;
      right: -360px;
      top: 0;
      bottom: 0;
      width: 340px;
      max-width: 85vw;
      background: var(--card);
      box-shadow: -4px 0 24px rgba(0,0,0,0.15);
      z-index: 10000;
      padding: 20px;
      overflow-y: auto;
      transition: right 0.3s ease;
    }
    .settings-panel.open { right: 0; }

    .settings-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 9999;
      display: none;
    }
    .settings-backdrop.open { display: block; }

    .settings-panel h2 {
      font-size: 18px;
      margin-bottom: 16px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .settings-section {
      margin-bottom: 20px;
    }

    .settings-section h3 {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .theme-option {
      padding: 8px 6px;
      border-radius: 8px;
      border: 2px solid var(--border);
      background: var(--card);
      cursor: pointer;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      transition: all 0.15s;
    }

    .theme-option:hover {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .theme-option.active {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
    }

    .settings-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--text-light);
    }

    /* Weekly meal mini view */
    .week-meals-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-top: 8px;
    }

    .week-meal-day {
      text-align: center;
      font-size: 9px;
    }

    .week-meal-day-name {
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .week-meal-item {
      font-size: 9px;
      color: var(--text);
      padding: 2px;
      border-radius: 3px;
      margin-bottom: 1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .week-meal-item.dinner { background: var(--accent-light); }
    .week-meal-item.lunch { background: var(--primary-light); }

    /* === LISTS === */
    .lists-card { grid-area: lists; }

    .list-group { margin-bottom: 10px; }
    .list-group:last-child { margin-bottom: 0; }

    .list-group-name {
      font-size: 10px;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      padding-bottom: 2px;
      border-bottom: 2px solid var(--primary-light);
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 0;
      font-size: 12px;
    }

    .list-item-check {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1.5px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .list-item-check:hover {
      border-color: var(--success);
      background: rgba(72, 187, 120, 0.1);
    }

    .list-item.checking-off {
      animation: checkOff 0.5s ease forwards;
    }

    @keyframes checkOff {
      0% { opacity: 1; transform: translateX(0); }
      50% { opacity: 0.6; transform: translateX(4px); }
      100% { opacity: 0; transform: translateX(20px); max-height: 0; padding: 0; margin: 0; overflow: hidden; }
    }

    .list-item.done .list-item-check {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }

    .list-item.done .list-item-text {
      text-decoration: line-through;
      opacity: 0.5;
    }

    /* === REMINDERS === */
    .reminders-card { grid-area: reminders; }

    .reminder-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px;
      background: var(--primary-light);
      border-radius: 10px;
      margin-bottom: 6px;
    }

    .reminder-item:last-child { margin-bottom: 0; }

    .reminder-icon {
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .reminder-content h4 {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 1px;
    }

    .reminder-content .time {
      font-size: 10px;
      color: var(--text-light);
    }

    /* === MOBILE (scrollable) === */
    /* Mobile-only sections (hidden on desktop where sidebar shows them) */
    .mobile-kids { display: none; grid-area: mobilekids; }
    .mobile-info { display: none; grid-area: mobileinfo; }

    .mobile-kids-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .mobile-kids-row .kid-points-card {
      min-width: 140px;
      flex: 1;
      padding: 10px;
    }

    .mobile-kids-row .points-total { font-size: 24px; }
    .mobile-kids-row .kid-name { font-size: 13px; }
    .mobile-kids-row .mickey-head,
    .mobile-kids-row .minnie-head { width: 22px; height: 22px; }
    .mobile-kids-row .mickey-head .head { width: 14px; height: 14px; }
    .mobile-kids-row .mickey-head .ear-left,
    .mobile-kids-row .mickey-head .ear-right { width: 8px; height: 8px; }
    .mobile-kids-row .minnie-head .head { width: 14px; height: 14px; }
    .mobile-kids-row .minnie-head .ear-left,
    .mobile-kids-row .minnie-head .ear-right { width: 8px; height: 8px; }

    .mobile-info-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    .mobile-info-row .mobile-clock {
      flex: 1;
      background: var(--card);
      border-radius: var(--radius);
      padding: 10px 14px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .mobile-info-row .mobile-clock .time {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    .mobile-info-row .mobile-clock .date {
      font-size: 10px;
      color: var(--text-light);
    }

    .mobile-info-row .mobile-weather {
      flex: 1;
      background: var(--card);
      border-radius: var(--radius);
      padding: 10px 14px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text);
    }

    @media (max-width: 1100px) {
      html, body { height: auto; overflow: auto; }
      .dashboard {
        height: auto;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto;
        grid-template-areas:
          "header header"
          "mobileinfo mobileinfo"
          "mobilekids mobilekids"
          "countdown countdown"
          "today upcoming"
          "lists meals"
          "reminders reminders";
      }
      .sidebar { display: none; }
      .mobile-kids { display: block; }
      .mobile-info { display: block; }
    }

    @media (max-width: 700px) {
      body { padding: 8px; }
      .dashboard {
        gap: 8px;
        grid-template-columns: 1fr;
        grid-template-rows: auto;
        grid-template-areas:
          "header"
          "mobileinfo"
          "mobilekids"
          "countdown"
          "today"
          "upcoming"
          "lists"
          "meals"
          "reminders";
      }
      .countdown-area { flex-direction: column; }
      .card { padding: 12px; }
      .card-title { font-size: 12px; }
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      color: var(--text-light);
      font-size: 16px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="dashboard" id="dashboard">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      Loading dashboard...
    </div>
  </div>

  <!-- Settings button + panel -->
  <button class="settings-btn" onclick="toggleSettings()" title="Settings">&#x2699;&#xFE0F;</button>
  <div class="settings-backdrop" id="settingsBackdrop" onclick="toggleSettings()"></div>
  <div class="settings-panel" id="settingsPanel">
    <button class="settings-close" onclick="toggleSettings()">&times;</button>
    <h2>&#x2699;&#xFE0F; Settings</h2>
    <div class="settings-section">
      <h3>Dashboard Theme</h3>
      <div class="theme-grid" id="themeGrid">Loading themes...</div>
    </div>
  </div>

  <script>
    const REFRESH_INTERVAL = 300000; // 5 minutes
    const POINTS_PER_MICKEY = 20;

    // Theme display names
    // Map all-day event titles to auto-theme keys
    // When a holiday appears in today's events, the theme auto-switches for the day
    const EVENT_TO_THEME = {
      'christmas day': 'christmas',
      'christmas': 'christmas',
      'boxing day': 'christmas',
      'halloween': 'halloween',
      'easter sunday': 'easter',
      'easter monday': 'easter',
      'good friday': 'easter',
      "valentine's day": 'valentines',
      'valentines day': 'valentines',
      'bonfire night': 'bonfire',
      "new year's day": 'newyear',
      "new year's eve": 'newyear',
      'new years day': 'newyear',
      'new years eve': 'newyear',
      "st patrick's day": 'stpatricks',
      'st patricks day': 'stpatricks',
      'thanksgiving': 'thanksgiving',
      "mother's day": 'easter',        // Mothering Sunday is near Easter
      'mothering sunday': 'easter',
    };

    /**
     * Check today's all-day events and return matching theme key, or null.
     * Priority: first match wins (events are in time order).
     */
    function detectAutoTheme(todayEvents) {
      if (!todayEvents || todayEvents.length === 0) return null;
      for (const e of todayEvents) {
        if (!e.all_day) continue;
        const key = EVENT_TO_THEME[e.title.toLowerCase().trim()];
        if (key) return key;
      }
      return null;
    }

    const THEME_NAMES = {
      default: 'Default',
      christmas: 'Christmas',
      halloween: 'Halloween',
      easter: 'Easter',
      valentines: "Valentine's Day",
      bonfire: 'Bonfire Night',
      newyear: "New Year's",
      stpatricks: "St Patrick's Day",
      thanksgiving: 'Thanksgiving',
      summer: 'Summer',
      frozen: 'Frozen',
      starwars: 'Star Wars',
      princess: 'Princess',
      pixar: 'Pixar',
      villains: 'Villains',
      mickey: 'Mickey & Friends',
      moana: 'Moana',
      encanto: 'Encanto',
      lionking: 'The Lion King',
      aladdin: 'Aladdin',
      littlemermaid: 'Little Mermaid',
      toystory: 'Toy Story',
      tangled: 'Tangled',
      cars: 'Cars',
      nemo: 'Finding Nemo',
      monsters: 'Monsters Inc',
      stitch: 'Lilo & Stitch',
      pooh: 'Winnie the Pooh',
      junglebook: 'Jungle Book',
      beautyandthebeast: 'Beauty & the Beast',
      peterpan: 'Peter Pan',
      cinderella: 'Cinderella',
      coco: 'Coco',
      brave: 'Brave',
      incredibles: 'The Incredibles',
      ratatouille: 'Ratatouille',
      zootopia: 'Zootopia',
    };

    // Theme emojis for the header badge
    const THEME_EMOJIS = {
      default: '',
      christmas: '\u{1F384}',
      halloween: '\u{1F383}',
      easter: '\u{1F430}',
      valentines: '\u{2764}\u{FE0F}',
      bonfire: '\u{1F386}',
      newyear: '\u{1F389}',
      stpatricks: '\u{2618}\u{FE0F}',
      thanksgiving: '\u{1F983}',
      summer: '\u{2600}\u{FE0F}',
      frozen: '\u{2744}\u{FE0F}',
      starwars: '\u{2B50}',
      princess: '\u{1F451}',
      pixar: '\u{1F3AC}',
      villains: '\u{1F9B9}',
      mickey: '\u{1F42D}',
      moana: '\u{1F30A}',
      encanto: '\u{1F33A}',
      lionking: '\u{1F981}',
      aladdin: '\u{1FA94}',
      littlemermaid: '\u{1F9DC}\u{200D}\u{2640}\u{FE0F}',
      toystory: '\u{1F680}',
      tangled: '\u{1F31F}',
      cars: '\u{1F3CE}\u{FE0F}',
      nemo: '\u{1F41F}',
      monsters: '\u{1F47E}',
      stitch: '\u{1F49C}',
      pooh: '\u{1F36F}',
      junglebook: '\u{1F43B}',
      beautyandthebeast: '\u{1F339}',
      peterpan: '\u{1F9DA}',
      cinderella: '\u{1F460}',
      coco: '\u{1F3B8}',
      brave: '\u{1F3F9}',
      incredibles: '\u{1F9B8}',
      ratatouille: '\u{1F468}\u{200D}\u{1F373}',
      zootopia: '\u{1F43E}',
    };

    // Wirral coordinates
    const WEATHER_LAT = 53.39;
    const WEATHER_LON = -3.02;
    let cachedWeather = null;
    let lastWeatherFetch = 0;
    const WEATHER_CACHE_MS = 30 * 60 * 1000;

    function weatherEmoji(code) {
      if (code === 0) return '\u2600\uFE0F';
      if (code <= 3) return '\u26C5';
      if (code <= 48) return '\u{1F32B}\uFE0F';
      if (code <= 55) return '\u{1F326}\uFE0F';
      if (code <= 57) return '\u{1F327}\uFE0F';
      if (code <= 65) return '\u{1F327}\uFE0F';
      if (code <= 67) return '\u{1F328}\uFE0F';
      if (code <= 75) return '\u{1F328}\uFE0F';
      if (code <= 77) return '\u{1F328}\uFE0F';
      if (code <= 82) return '\u{1F327}\uFE0F';
      if (code <= 86) return '\u2744\uFE0F';
      if (code <= 99) return '\u26C8\uFE0F';
      return '\u{1F324}\uFE0F';
    }

    async function fetchWeather() {
      const now = Date.now();
      if (cachedWeather && (now - lastWeatherFetch) < WEATHER_CACHE_MS) {
        return cachedWeather;
      }
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${WEATHER_LAT}&longitude=${WEATHER_LON}&daily=weathercode,temperature_2m_max,temperature_2m_min&forecast_days=5&timezone=Europe%2FLondon`;
        const res = await fetch(url);
        if (!res.ok) return null;
        const data = await res.json();
        cachedWeather = data.daily;
        lastWeatherFetch = now;
        return cachedWeather;
      } catch (e) {
        return cachedWeather;
      }
    }

    function renderWeather(weather) {
      if (!weather) return '';
      const days = weather.time.map((date, i) => {
        const d = new Date(date + 'T12:00:00');
        const dayName = i === 0 ? 'Today' : d.toLocaleDateString('en-US', { weekday: 'short' });
        return `
          <div class="weather-day">
            <div class="weather-day-name">${dayName}</div>
            <div class="weather-day-icon">${weatherEmoji(weather.weathercode[i])}</div>
            <div class="weather-day-temp">${Math.round(weather.temperature_2m_max[i])}\u00B0</div>
            <div class="weather-day-low">${Math.round(weather.temperature_2m_min[i])}\u00B0</div>
          </div>
        `;
      });
      return `
        <div class="weather-card">
          <div class="weather-title">Wirral Weather</div>
          <div class="weather-days">${days.join('')}</div>
        </div>
      `;
    }

    function kidColorClass(name) {
      const lower = (name || '').toLowerCase();
      if (lower === 'sam') return 'sam';
      if (lower === 'robyn') return 'robyn';
      return 'default-kid';
    }

    async function fetchData() {
      const params = new URLSearchParams(window.location.search);
      const secret = params.get('secret');
      const res = await fetch(`/api/dashboard?secret=${secret}`);
      if (!res.ok) throw new Error('Failed to load');
      return res.json();
    }

    function applyTheme(theme) {
      const body = document.body;
      // Remove all theme classes
      body.className = body.className.replace(/theme-\S+/g, '').trim();
      if (theme && theme !== 'default') {
        body.classList.add(`theme-${theme}`);
      }
    }

    function renderCountdowns(countdowns) {
      if (!countdowns || countdowns.length === 0) {
        return `<div class="countdown-area"><div class="countdown-empty">No countdowns set</div></div>`;
      }

      return `
        <div class="countdown-area">
          ${countdowns.map(c => `
            <div class="countdown-card bg-${esc(c.background || 'fireworks')}">
              <div class="sparkles">
                ${Array.from({length: 10}, (_, i) => `
                  <div class="sparkle" style="left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${(i*0.3).toFixed(1)}s"></div>
                `).join('')}
              </div>
              <div class="countdown-title">${esc(c.title)}</div>
              <div class="countdown-days">${c.days_until}</div>
              <div class="countdown-label">${c.days_until === 1 ? 'day to go!' : 'days to go!'}</div>
              <div class="countdown-date">${new Date(c.target_date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderMickeyHead() {
      return `
        <div class="mickey-head">
          <div class="ear-left"></div>
          <div class="ear-right"></div>
          <div class="head"></div>
        </div>
      `;
    }

    function renderMinnieHead() {
      return `
        <div class="minnie-head">
          <div class="bow">
            <div class="bow-left"></div>
            <div class="bow-right"></div>
            <div class="bow-center"></div>
          </div>
          <div class="ear-left"></div>
          <div class="ear-right"></div>
          <div class="head"></div>
        </div>
      `;
    }

    function renderKidSparkles() {
      return `
        <div class="kid-sparkles">
          ${Array.from({length: 8}, (_, i) => `
            <div class="kid-sparkle" style="left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${(i*0.35).toFixed(2)}s"></div>
          `).join('')}
        </div>
      `;
    }

    function renderSidebarKidPoints(kidPoints) {
      if (!kidPoints || kidPoints.length === 0) return '';

      return kidPoints.map(kid => {
        const mickeyCount = kid.mickey_heads;
        const progressInCurrentMickey = kid.remaining_points;
        const progressPct = (progressInCurrentMickey / POINTS_PER_MICKEY) * 100;
        const toNext = POINTS_PER_MICKEY - progressInCurrentMickey;
        const isRobyn = (kid.kid_name || '').toLowerCase() === 'robyn';
        const headFn = isRobyn ? renderMinnieHead : renderMickeyHead;
        const emptyMsg = isRobyn ? 'No Minnie Heads yet!' : 'No Mickey Heads yet!';
        const nextLabel = isRobyn ? 'Minnie Head' : 'Mickey Head';

        return `
          <div class="kid-points-card ${kidColorClass(kid.kid_name)}">
            ${renderKidSparkles()}
            <div class="kid-name">${esc(kid.kid_name)}</div>
            <div class="mickey-heads">
              ${mickeyCount > 0
                ? Array.from({length: mickeyCount}, () => headFn()).join('')
                : `<span class="points-empty-msg">${emptyMsg}</span>`}
            </div>
            <div class="points-total">${progressInCurrentMickey}</div>
            <div class="points-label">points</div>
            <div class="points-progress">
              <div class="progress-bar-track">
                <div class="progress-bar-fill" style="width:${progressPct}%"></div>
              </div>
              <div class="progress-label">${toNext} point${toNext !== 1 ? 's' : ''} to next ${nextLabel}</div>
            </div>
            <div class="points-adjust">
              <button class="points-btn btn-minus" data-kid="${esc(kid.kid_name)}" data-change="-1">−</button>
              <button class="points-btn btn-plus" data-kid="${esc(kid.kid_name)}" data-change="1">+</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function getSecret() {
      return new URLSearchParams(window.location.search).get('secret');
    }

    function getTodayStr() {
      return new Date().toLocaleDateString('en-CA');
    }

    async function saveMeal({ meal_date, meal_type, title, notes }) {
      const res = await fetch(`/api/meals?secret=${getSecret()}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ meal_date, meal_type, title, notes }),
      });
      if (!res.ok) throw new Error('Failed to save meal');
      return res.json();
    }

    async function saveEvent({ title, starts_at, ends_at, description, all_day }) {
      const res = await fetch(`/api/events?secret=${getSecret()}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, starts_at, ends_at, description, all_day }),
      });
      if (!res.ok) throw new Error('Failed to save event');
      return res.json();
    }

    async function saveListItem(list_name, text) {
      const res = await fetch(`/api/list-items?secret=${getSecret()}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ list_name, text }),
      });
      if (!res.ok) throw new Error('Failed to add list item');
      return res.json();
    }

    async function saveReminder({ message, remind_at }) {
      const res = await fetch(`/api/reminders?secret=${getSecret()}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, remind_at }),
      });
      if (!res.ok) throw new Error('Failed to save reminder');
      return res.json();
    }

    async function deleteMeal(meal_date, meal_type) {
      const res = await fetch(`/api/meals?secret=${getSecret()}`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ meal_date, meal_type }),
      });
      if (!res.ok) throw new Error('Failed to delete meal');
      return res.json();
    }

    function openMealModal({ date, type, title, notes } = {}) {
      const isEdit = Boolean(title);
      const todayStr = getTodayStr();
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal">
          <h3>${isEdit ? 'Edit Meal' : 'Add Meal'}</h3>
          <label>Date</label>
          <input type="date" id="meal-date" value="${date || todayStr}" min="${todayStr}">
          <label>Meal Type</label>
          <select id="meal-type">
            <option value="breakfast" ${type === 'breakfast' ? 'selected' : ''}>Breakfast</option>
            <option value="lunch" ${type === 'lunch' ? 'selected' : ''}>Lunch</option>
            <option value="dinner" ${type === 'dinner' ? 'selected' : ''}>Dinner</option>
            <option value="snack" ${type === 'snack' ? 'selected' : ''}>Snack</option>
          </select>
          <label>Title</label>
          <input type="text" id="meal-title" value="${esc(title || '')}" placeholder="e.g. Spaghetti Bolognese">
          <label>Notes (optional)</label>
          <input type="text" id="meal-notes-input" value="${esc(notes || '')}" placeholder="e.g. with garlic bread">
          <div class="modal-buttons">
            <button class="btn-cancel" id="meal-cancel">Cancel</button>
            <button class="btn-save" id="meal-save">Save</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);

      overlay.querySelector('#meal-cancel').onclick = () => overlay.remove();
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

      overlay.querySelector('#meal-save').onclick = async () => {
        const meal_date = overlay.querySelector('#meal-date').value;
        const meal_type = overlay.querySelector('#meal-type').value;
        const titleVal = overlay.querySelector('#meal-title').value.trim();
        if (!titleVal) { overlay.querySelector('#meal-title').focus(); return; }
        try {
          await saveMeal({ meal_date, meal_type, title: titleVal, notes: overlay.querySelector('#meal-notes-input').value.trim() || null });
          overlay.remove();
          refreshDashboard();
        } catch (err) {
          console.error(err);
        }
      };

      setTimeout(() => overlay.querySelector('#meal-title').focus(), 50);
    }

    async function handleDeleteMeal(date, type, btnEl) {
      const row = btnEl?.closest('.meal-slot');
      if (row) {
        row.classList.add('removing');
        await new Promise(r => setTimeout(r, 400));
      }
      try {
        await deleteMeal(date, type);
        refreshDashboard();
      } catch (err) {
        console.error(err);
        if (row) row.classList.remove('removing');
      }
    }

    async function handlePointsAdjust(btn) {
      const kidName = btn.dataset.kid;
      const change = parseInt(btn.dataset.change, 10);
      btn.disabled = true;

      // Show floating toast
      const wrapper = btn.closest('.points-adjust');
      const toast = document.createElement('span');
      toast.className = 'points-toast';
      toast.textContent = change > 0 ? `+${change}` : `${change}`;
      wrapper.appendChild(toast);
      setTimeout(() => toast.remove(), 800);

      // Optimistically update the number in the UI
      const card = btn.closest('.kid-points-card');
      const totalEl = card?.querySelector('.points-total');
      if (totalEl) {
        const current = parseInt(totalEl.textContent, 10) || 0;
        totalEl.textContent = Math.max(0, current + change);
      }

      try {
        const res = await fetch(`/api/points?secret=${getSecret()}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ kid_name: kidName, change, reason: 'Dashboard' }),
        });
        if (!res.ok) throw new Error('Failed');
        // Small delay so cache invalidation takes effect
        setTimeout(() => refreshDashboard(), 500);
      } catch (err) {
        console.error('Points adjust error:', err);
        // Revert optimistic update
        await refreshDashboard();
      } finally {
        btn.disabled = false;
      }
    }

    async function handleCheckOffItem(itemEl) {
      const listName = itemEl.dataset.listName;
      const itemText = itemEl.dataset.itemText;
      if (!listName || !itemText) return;

      // Optimistic UI: animate check + fade out
      const check = itemEl.querySelector('.list-item-check');
      check.innerHTML = '&#x2713;';
      check.style.background = 'var(--success)';
      check.style.borderColor = 'var(--success)';
      check.style.color = 'white';
      itemEl.querySelector('.list-item-text').style.textDecoration = 'line-through';

      // Slight delay then animate removal
      await new Promise(r => setTimeout(r, 300));
      itemEl.classList.add('checking-off');

      // Call API to remove
      try {
        await fetch(`/api/list-items?secret=${getSecret()}`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ list_name: listName, text: itemText }),
        });
      } catch (err) {
        console.error('Failed to remove list item:', err);
      }

      // Remove from DOM after animation, then refresh
      setTimeout(() => {
        itemEl.remove();
        // If the list group is now empty, remove it too
        const group = itemEl.closest && document.querySelectorAll('.list-group');
        group?.forEach(g => {
          if (g.querySelectorAll('.list-item').length === 0) g.remove();
        });
        refreshDashboard();

    function renderMeals(meals) {
      const todayMeals = meals?.today || [];
      const weekMeals = meals?.week || [];
      const todayStr = getTodayStr();

      // Group week meals by day, excluding today (shown separately above)
      const weekByDay = {};
      weekMeals.forEach(m => {
        if (m.date === todayStr) return; // skip today — already shown
        if (m.date < todayStr) return;   // skip past days
        if (!weekByDay[m.date]) weekByDay[m.date] = { label: m.day_label, meals: [] };
        weekByDay[m.date].meals.push(m);
      });

      const mealEmojis = {
        breakfast: '\u{1F950}',
        lunch: '\u{1F96A}',
        dinner: '\u{1F35D}',
        snack: '\u{1F36A}',
      };

      let todayHTML = '';
      if (todayMeals.length > 0) {
        todayHTML = todayMeals.map(m => {
          const dataAttrs = `data-date="${todayStr}" data-type="${esc(m.type)}" data-title="${esc(m.title)}" data-notes="${esc(m.notes || '')}"`;
          return `
          <div class="meal-slot">
            <div class="meal-type-badge meal-type-${esc(m.type)}">${mealEmojis[m.type] || ''} ${esc(m.type)}</div>

            </div>
          </div>
        `}).join('');
      } else {
        todayHTML = '<div class="empty-state"><div class="icon">\u{1F37D}\uFE0F</div>No meals planned today</div>';
      }

      todayHTML += `<button class="card-add-btn meal-add-new">+ Add meal</button>`;

      // Week overview (compact) — future days only
      let weekHTML = '';
      const dayEntries = Object.entries(weekByDay);
      if (dayEntries.length > 0) {
        weekHTML = `
          <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border);">
            <div style="font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;margin-bottom:6px;">Coming Up</div>
            ${dayEntries.map(([date, info]) => `
              <div style="display:flex;gap:6px;margin-bottom:4px;font-size:11px;align-items:center;">
                <span style="min-width:65px;color:var(--text-light);font-weight:600;">${esc(info.label)}</span>

              </div>
            `).join('')}
          </div>
        `;
      }

      return todayHTML + weekHTML;
    }

    /* ---- Meal picker wheel ---- */
    let wheelMeals = [];

    async function openMealWheel() {
      // Fetch all historical meal titles
      try {
        const res = await fetch(`/api/meal-titles?secret=${getSecret()}`);
        const data = await res.json();
        wheelMeals = data.titles || [];
      } catch (err) {
        console.error('Failed to load meals:', err);
        wheelMeals = [];
      }

      if (wheelMeals.length < 2) {
        alert('Not enough meals in history to spin! Add more meals first.');
        return;
      }

      const overlay = document.createElement('div');
      overlay.className = 'wheel-overlay';

      // Shuffle meals and duplicate for seamless scrolling
      const shuffled = [...wheelMeals].sort(() => Math.random() - 0.5);
      const displayItems = [];
      for (let i = 0; i < 60; i++) {
        displayItems.push(shuffled[i % shuffled.length]);
      }

      overlay.innerHTML = `
        <div class="wheel-container">
          <h3>&#x1F3B0; Meal Picker</h3>
          <div class="wheel-display">
            <div class="wheel-pointer"></div>
            <div class="wheel-items" id="wheelItems">
              ${displayItems.map(m => `<div class="wheel-item">${esc(m)}</div>`).join('')}
            </div>
          </div>
          <div class="wheel-result" id="wheelResult"></div>
          <div class="wheel-buttons">
            <button class="btn-cancel" id="wheelClose">Close</button>
            <button class="btn-spin" id="wheelSpin">&#x1F3B2; Spin!</button>
          </div>
        </div>
      `;

      document.body.appendChild(overlay);
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
      overlay.querySelector('#wheelClose').onclick = () => overlay.remove();

      const itemsEl = overlay.querySelector('#wheelItems');
      const resultEl = overlay.querySelector('#wheelResult');
      const spinBtn = overlay.querySelector('#wheelSpin');

      // Center the items initially
      itemsEl.style.transform = 'translateY(60px)';

      spinBtn.onclick = () => {
        spinBtn.disabled = true;
        resultEl.textContent = '';

        // Pick random landing position (items 30-50 range)
        const winIndex = 30 + Math.floor(Math.random() * 15);
        const targetOffset = -(winIndex * 60) + 60; // 60px = item height, offset to center

        // Reset and spin
        itemsEl.style.transition = 'none';
        itemsEl.style.transform = 'translateY(60px)';

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            itemsEl.style.transition = 'transform 3s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
            itemsEl.style.transform = `translateY(${targetOffset}px)`;
          });
        });

        setTimeout(() => {
          const winner = displayItems[winIndex];
          resultEl.textContent = winner;

          // Highlight the winning item
          const items = itemsEl.querySelectorAll('.wheel-item');
          items.forEach((el, i) => el.classList.toggle('highlight', i === winIndex));

          spinBtn.disabled = false;
          spinBtn.textContent = '🎲 Spin again!';
        }, 3200);
      };
    }

    async function loadThemes() {
      const grid = document.getElementById('themeGrid');
      try {
        const res = await fetch(`/api/themes?secret=${getSecret()}`);
        const themes = await res.json();
        const currentTheme = window._dashData?.theme || 'default';

        let html = '';
        const sections = [
          { label: 'General', items: themes.general },
          { label: 'Holiday', items: themes.holiday },
          { label: 'Disney', items: themes.disney },
        ];

        for (const section of sections) {
          html += `<div style="grid-column:1/-1;font-size:10px;font-weight:700;color:var(--text-light);text-transform:uppercase;margin-top:6px;">${section.label}</div>`;
          for (const t of section.items) {
            const active = t.key === currentTheme ? ' active' : '';
            html += `<button class="theme-option${active}" data-theme="${t.key}">${t.name}</button>`;
          }
        }
        grid.innerHTML = html;

        grid.addEventListener('click', async (e) => {
          const btn = e.target.closest('.theme-option');
          if (!btn) return;
          const theme = btn.dataset.theme;
          grid.querySelectorAll('.theme-option').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          try {
            await fetch(`/api/theme?secret=${getSecret()}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ theme }),
            });
            // Apply theme class to body immediately
            document.body.className = theme !== 'default' ? `theme-${theme}` : '';
            refreshDashboard();
          } catch (err) {
            console.error('Theme set error:', err);
          }
        });
      } catch (err) {
        grid.textContent = 'Failed to load themes';
      }
    }

    function esc(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-US', {
        hour: '2-digit',
        minute: '2-digit',
        hour12: true,
      });
      const el = document.getElementById('clock');
      if (el) el.textContent = timeStr;
      const mob = document.getElementById('mobile-clock');
      if (mob) mob.textContent = timeStr;
    }

    function updateMobileWeather() {
      const el = document.getElementById('mobile-weather');
      if (!el || !window._lastWeather) return;
      const w = window._lastWeather;
      if (!w || !w.time) { el.textContent = ''; return; }
      const emoji = weatherEmoji(w.weathercode[0]);
      const hi = Math.round(w.temperature_2m_max[0]);
      const lo = Math.round(w.temperature_2m_min[0]);
      el.innerHTML = `<span style="font-size:20px">${emoji}</span> <span>${hi}°/${lo}°</span>`;
    }


    async function refreshDashboard() {
      try {
        const [data, weather] = await Promise.all([fetchData(), fetchWeather()]);
        window._dashData = data;
        window._lastWeather = weather;
        render(data, weather);
        updateMobileWeather();
      } catch (e) { /* silently retry */ }
    }

    window.refreshDashboard = refreshDashboard;

    async function init() {
      try {
        await refreshDashboard();
      } catch (err) {
        document.getElementById('dashboard').innerHTML =
          '<div class="loading">Failed to load dashboard. Check your URL.</div>';
      }

      setInterval(refreshDashboard, REFRESH_INTERVAL);
      setInterval(updateClock, 1000);
    }

    init();
  </script>
</body>
</html>
