<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #e8f0fe;
      --card: #ffffff;
      --primary: #4a7af7;
      --primary-light: #e3ecff;
      --accent: #9b6dff;
      --accent-light: #ede5ff;
      --text: #2d3748;
      --text-light: #718096;
      --success: #48bb78;
      --warning: #f6ad55;
      --border: #e2e8f0;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --radius: 14px;
      --mickey-gold: #f5c518;
    }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* === TV LAYOUT: fill viewport exactly === */
    .dashboard {
      height: 100vh;
      padding: 12px;
      display: grid;
      grid-template-columns: 220px 1fr 1fr 1fr;
      grid-template-rows: auto 1fr 1fr;
      gap: 12px;
      grid-template-areas:
        "sidebar header   header    header"
        "sidebar countdown today    upcoming"
        "sidebar points   lists     reminders";
    }

    /* Cards */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-light);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .card-title .icon { font-size: 16px; }

    .card-body {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .card-body::-webkit-scrollbar { width: 3px; }
    .card-body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    /* === SIDEBAR === */
    .sidebar {
      grid-area: sidebar;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .profile-card {
      text-align: center;
      padding: 20px 12px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .profile-card .family-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .profile-card .subtitle {
      font-size: 11px;
      opacity: 0.85;
    }

    .profile-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat-card {
      background: var(--card);
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
    }

    .stat-label {
      font-size: 9px;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-top: 2px;
    }

    .clock-card {
      text-align: center;
      padding: 12px;
    }

    .clock-time {
      font-size: 36px;
      font-weight: 200;
      color: var(--primary);
      letter-spacing: -1px;
    }

    .clock-date {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 2px;
    }

    /* === HEADER === */
    .header {
      grid-area: header;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .header .updated {
      font-size: 11px;
      color: var(--text-light);
    }

    .live-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
      margin-right: 4px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* === COUNTDOWN === */
    .countdown-area {
      grid-area: countdown;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .countdown-card {
      flex: 1;
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      color: white;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .countdown-card .sparkles {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .countdown-card .sparkle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: sparkle-float 3s infinite ease-in-out;
    }

    @keyframes sparkle-float {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
      50% { transform: translateY(-15px) scale(1.5); opacity: 1; }
    }

    .countdown-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      position: relative;
    }

    .countdown-days {
      font-size: 56px;
      font-weight: 800;
      line-height: 1;
      position: relative;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .countdown-label {
      font-size: 13px;
      font-weight: 500;
      opacity: 0.9;
      margin-top: 2px;
      position: relative;
    }

    .countdown-date {
      font-size: 10px;
      opacity: 0.75;
      margin-top: 4px;
      position: relative;
    }

    .countdown-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      color: var(--text-light);
      font-size: 13px;
    }

    /* Countdown backgrounds */
    .bg-fireworks { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); }
    .bg-castle { background: linear-gradient(135deg, #1b1464, #6c3ec1, #c86dd7); }
    .bg-stars { background: linear-gradient(135deg, #0c0c1d, #1a1a3e, #2d2b55); }
    .bg-rainbow { background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3); }
    .bg-beach { background: linear-gradient(135deg, #0abde3, #48dbfb, #feca57); }
    .bg-party { background: linear-gradient(135deg, #ff6348, #ff9ff3, #feca57, #48dbfb); }

    /* === KID POINTS === */
    .points-area {
      grid-area: points;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .kid-points-card {
      flex: 1;
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .kid-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .mickey-heads {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
      min-height: 32px;
      align-items: center;
    }

    .mickey-head {
      width: 32px;
      height: 32px;
      position: relative;
      display: inline-block;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.15));
    }

    .mickey-head .head {
      width: 22px;
      height: 22px;
      background: var(--mickey-gold);
      border-radius: 50%;
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    .mickey-head .ear-left,
    .mickey-head .ear-right {
      width: 13px;
      height: 13px;
      background: var(--mickey-gold);
      border-radius: 50%;
      position: absolute;
      top: 0;
    }

    .mickey-head .ear-left { left: 1px; }
    .mickey-head .ear-right { right: 1px; }

    .points-total {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
    }

    .points-label {
      font-size: 11px;
      color: var(--text-light);
      margin-top: 2px;
    }

    .points-progress {
      margin-top: 8px;
    }

    .progress-bar-track {
      width: 100%;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--mickey-gold), #ffda44);
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .progress-label {
      font-size: 10px;
      color: var(--text-light);
      margin-top: 4px;
    }

    .points-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      color: var(--text-light);
      font-size: 13px;
    }

    /* === TODAY === */
    .today-card { grid-area: today; }

    .event-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .event-item:last-child { border-bottom: none; }

    .event-time-badge {
      background: var(--primary-light);
      color: var(--primary);
      font-size: 10px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 6px;
      white-space: nowrap;
      min-width: 65px;
      text-align: center;
    }

    .event-time-badge.all-day {
      background: var(--accent-light);
      color: var(--accent);
    }

    .event-details h3 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 1px;
    }

    .event-details p {
      font-size: 11px;
      color: var(--text-light);
    }

    .empty-state {
      text-align: center;
      padding: 20px 10px;
      color: var(--text-light);
      font-size: 13px;
    }

    .empty-state .icon {
      font-size: 28px;
      margin-bottom: 8px;
      opacity: 0.5;
    }

    /* === UPCOMING === */
    .upcoming-card { grid-area: upcoming; }

    .day-group { margin-bottom: 10px; }
    .day-group:last-child { margin-bottom: 0; }

    .day-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      padding-bottom: 2px;
      border-bottom: 2px solid var(--primary-light);
    }

    .day-event {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 12px;
    }

    .day-event .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
      flex-shrink: 0;
    }

    .day-event .time {
      font-size: 10px;
      color: var(--text-light);
      min-width: 60px;
    }

    /* === LISTS === */
    .lists-card { grid-area: lists; }

    .list-section { margin-bottom: 12px; }
    .list-section:last-child { margin-bottom: 0; }

    .list-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .list-name .count {
      background: var(--accent-light);
      color: var(--accent);
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 8px;
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 0;
      font-size: 12px;
    }

    .list-item .checkbox {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 9px;
    }

    .list-item.checked .checkbox {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }

    .list-item.checked .item-text {
      text-decoration: line-through;
      color: var(--text-light);
    }

    /* === REMINDERS === */
    .reminders-card { grid-area: reminders; }

    .reminder-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px;
      background: var(--primary-light);
      border-radius: 10px;
      margin-bottom: 6px;
    }

    .reminder-item:last-child { margin-bottom: 0; }

    .reminder-icon {
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .reminder-content h4 {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 1px;
    }

    .reminder-content .time {
      font-size: 10px;
      color: var(--text-light);
    }

    /* === MOBILE (scrollable) === */
    @media (max-width: 1100px) {
      html, body { height: auto; overflow: auto; }
      .dashboard {
        height: auto;
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
          "header header"
          "countdown countdown"
          "points points"
          "today upcoming"
          "lists reminders";
      }
      .sidebar { display: none; }
      .countdown-area { flex-direction: row; }
      .points-area { flex-direction: row; }
    }

    @media (max-width: 700px) {
      body { padding: 8px; }
      .dashboard {
        grid-template-columns: 1fr;
        grid-template-areas:
          "header"
          "countdown"
          "points"
          "today"
          "upcoming"
          "lists"
          "reminders";
      }
      .countdown-area { flex-direction: column; }
      .points-area { flex-direction: column; }
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      color: var(--text-light);
      font-size: 16px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="dashboard" id="dashboard">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      Loading dashboard...
    </div>
  </div>

  <script>
    const REFRESH_INTERVAL = 60000;
    const POINTS_PER_MICKEY = 20;

    async function fetchData() {
      const params = new URLSearchParams(window.location.search);
      const secret = params.get('secret');
      const res = await fetch(`/api/dashboard?secret=${secret}`);
      if (!res.ok) throw new Error('Failed to load');
      return res.json();
    }

    function renderCountdowns(countdowns) {
      if (!countdowns || countdowns.length === 0) {
        return `<div class="countdown-area"><div class="countdown-empty">No countdowns set</div></div>`;
      }

      return `
        <div class="countdown-area">
          ${countdowns.map(c => `
            <div class="countdown-card bg-${esc(c.background || 'fireworks')}">
              <div class="sparkles">
                ${Array.from({length: 10}, (_, i) => `
                  <div class="sparkle" style="left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${(i*0.3).toFixed(1)}s"></div>
                `).join('')}
              </div>
              <div class="countdown-title">${esc(c.title)}</div>
              <div class="countdown-days">${c.days_until}</div>
              <div class="countdown-label">${c.days_until === 1 ? 'day to go!' : 'days to go!'}</div>
              <div class="countdown-date">${new Date(c.target_date + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderMickeyHead() {
      return `
        <div class="mickey-head">
          <div class="ear-left"></div>
          <div class="ear-right"></div>
          <div class="head"></div>
        </div>
      `;
    }

    function renderKidPoints(kidPoints) {
      if (!kidPoints || kidPoints.length === 0) {
        return `<div class="points-area"><div class="points-empty">No points yet</div></div>`;
      }

      return `
        <div class="points-area">
          ${kidPoints.map(kid => {
            const mickeyCount = kid.mickey_heads;
            const progressInCurrentMickey = kid.points % POINTS_PER_MICKEY;
            const progressPct = (progressInCurrentMickey / POINTS_PER_MICKEY) * 100;
            const toNext = POINTS_PER_MICKEY - progressInCurrentMickey;

            return `
              <div class="kid-points-card">
                <div class="kid-name">${esc(kid.kid_name)}</div>
                <div class="mickey-heads">
                  ${mickeyCount > 0
                    ? Array.from({length: mickeyCount}, () => renderMickeyHead()).join('')
                    : '<span style="color:var(--text-light);font-size:11px">No Mickey Heads yet!</span>'}
                </div>
                <div class="points-total">${kid.points}</div>
                <div class="points-label">total points</div>
                <div class="points-progress">
                  <div class="progress-bar-track">
                    <div class="progress-bar-fill" style="width:${progressPct}%"></div>
                  </div>
                  <div class="progress-label">${toNext} point${toNext !== 1 ? 's' : ''} to next Mickey Head</div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    function render(data) {
      const dashboard = document.getElementById('dashboard');
      dashboard.innerHTML = `
        <!-- Sidebar -->
        <div class="sidebar">
          <div class="profile-card">
            <div class="profile-avatar">&#x1F468;&#x200D;&#x1F469;&#x200D;&#x1F467;&#x200D;&#x1F466;</div>
            <div class="family-name">${esc(data.family_name)}</div>
            <div class="subtitle">Family Dashboard</div>
          </div>

          <div class="card clock-card">
            <div class="clock-time" id="clock"></div>
            <div class="clock-date">${esc(data.today.date)}</div>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-value">${data.today.events.length}</div>
              <div class="stat-label">Today</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${data.week.events.length}</div>
              <div class="stat-label">This Week</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${data.reminders.length}</div>
              <div class="stat-label">Reminders</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${data.lists.reduce((n, l) => n + l.items.filter(i => !i.checked).length, 0)}</div>
              <div class="stat-label">List Items</div>
            </div>
          </div>
        </div>

        <!-- Header -->
        <div class="header card">
          <h1>Family Dashboard</h1>
          <div class="updated">
            <span class="live-dot"></span>
            Updated ${new Date(data.updated_at).toLocaleTimeString()}
          </div>
        </div>

        <!-- Countdowns -->
        ${renderCountdowns(data.countdowns)}

        <!-- Today's Events -->
        <div class="card today-card">
          <div class="card-title"><span class="icon">&#x1F4C5;</span> Today's Schedule</div>
          <div class="card-body">
            ${data.today.events.length === 0
              ? '<div class="empty-state"><div class="icon">&#x1F324;&#xFE0F;</div>No events today</div>'
              : data.today.events.map(e => `
                <div class="event-item">
                  <div class="event-time-badge ${e.all_day ? 'all-day' : ''}">${esc(e.starts_at_display)}</div>
                  <div class="event-details">
                    <h3>${esc(e.title)}</h3>
                    ${e.description ? `<p>${esc(e.description)}</p>` : ''}
                  </div>
                </div>
              `).join('')}
          </div>
        </div>

        <!-- Upcoming Week -->
        <div class="card upcoming-card">
          <div class="card-title"><span class="icon">&#x1F5D3;&#xFE0F;</span> Upcoming Week</div>
          <div class="card-body">
            ${data.week.events.length === 0
              ? '<div class="empty-state"><div class="icon">&#x1F4ED;</div>No upcoming events</div>'
              : renderWeekEvents(data.week.events)}
          </div>
        </div>

        <!-- Lists -->
        <div class="card lists-card">
          <div class="card-title"><span class="icon">&#x1F4DD;</span> Shared Lists</div>
          <div class="card-body">
            ${data.lists.length === 0
              ? '<div class="empty-state"><div class="icon">&#x1F4CB;</div>No lists yet</div>'
              : data.lists.map(list => `
                <div class="list-section">
                  <div class="list-name">
                    ${esc(list.name)}
                    <span class="count">${list.items.filter(i => !i.checked).length}</span>
                  </div>
                  ${list.items.map(item => `
                    <div class="list-item ${item.checked ? 'checked' : ''}">
                      <div class="checkbox">${item.checked ? '&#x2713;' : ''}</div>
                      <span class="item-text">${esc(item.text)}</span>
                    </div>
                  `).join('')}
                </div>
              `).join('')}
          </div>
        </div>

        <!-- Reminders -->
        <div class="card reminders-card">
          <div class="card-title"><span class="icon">&#x23F0;</span> Pending Reminders</div>
          <div class="card-body">
            ${data.reminders.length === 0
              ? '<div class="empty-state"><div class="icon">&#x2705;</div>No pending reminders</div>'
              : data.reminders.map(r => `
                <div class="reminder-item">
                  <div class="reminder-icon">&#x1F514;</div>
                  <div class="reminder-content">
                    <h4>${esc(r.message)}</h4>
                    <div class="time">${esc(r.remind_at_display)}</div>
                  </div>
                </div>
              `).join('')}
          </div>
        </div>

        <!-- Kid Points -->
        ${renderKidPoints(data.kid_points)}
      `;

      updateClock();
    }

    function renderWeekEvents(events) {
      const byDay = {};
      events.forEach(e => {
        if (!byDay[e.day_label]) byDay[e.day_label] = [];
        byDay[e.day_label].push(e);
      });

      return Object.entries(byDay).map(([day, evts]) => `
        <div class="day-group">
          <div class="day-label">${esc(day)}</div>
          ${evts.map(e => `
            <div class="day-event">
              <div class="dot"></div>
              <span class="time">${esc(e.starts_at_display)}</span>
              <span>${esc(e.title)}</span>
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    function esc(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function updateClock() {
      const el = document.getElementById('clock');
      if (!el) return;
      const now = new Date();
      el.textContent = now.toLocaleTimeString('en-US', {
        hour: '2-digit',
        minute: '2-digit',
        hour12: true,
      });
    }

    async function init() {
      try {
        const data = await fetchData();
        render(data);
      } catch (err) {
        document.getElementById('dashboard').innerHTML =
          '<div class="loading">Failed to load dashboard. Check your URL.</div>';
      }

      setInterval(async () => {
        try {
          const data = await fetchData();
          render(data);
        } catch (e) { /* silently retry next interval */ }
      }, REFRESH_INTERVAL);

      setInterval(updateClock, 1000);
    }

    init();
  </script>
</body>
</html>
