<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #e8f0fe;
      --card: #ffffff;
      --primary: #4a7af7;
      --primary-light: #e3ecff;
      --accent: #9b6dff;
      --accent-light: #ede5ff;
      --text: #2d3748;
      --text-light: #718096;
      --success: #48bb78;
      --warning: #f6ad55;
      --border: #e2e8f0;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --radius: 14px;
      --mickey-gold: #f5c518;
      --header-gradient: linear-gradient(135deg, var(--primary), var(--accent));
      --theme-emoji: '';
    }

    /* ============ THEME DEFINITIONS ============ */

    /* Christmas */
    .theme-christmas {
      --bg: #1a472a;
      --card: rgba(255,255,255,0.95);
      --primary: #c41e3a;
      --primary-light: #fde8ec;
      --accent: #2d7d46;
      --accent-light: #e6f4ea;
      --text: #1a2e1a;
      --text-light: #4a6a4a;
      --border: #d4e8d4;
      --header-gradient: linear-gradient(135deg, #c41e3a, #2d7d46);
      --theme-emoji: '';
    }

    /* Halloween */
    .theme-halloween {
      --bg: #1a1a2e;
      --card: rgba(30,30,50,0.92);
      --primary: #ff6f00;
      --primary-light: rgba(255,111,0,0.15);
      --accent: #9c27b0;
      --accent-light: rgba(156,39,176,0.15);
      --text: #e0e0e0;
      --text-light: #a0a0b0;
      --border: #3a3a5a;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
      --header-gradient: linear-gradient(135deg, #ff6f00, #9c27b0);
    }

    /* Easter */
    .theme-easter {
      --bg: #f0f9e8;
      --card: rgba(255,255,255,0.95);
      --primary: #e8a0bf;
      --primary-light: #fce4ec;
      --accent: #81c784;
      --accent-light: #e8f5e9;
      --text: #3e2723;
      --text-light: #6d5a52;
      --border: #e0d4e8;
      --header-gradient: linear-gradient(135deg, #e8a0bf, #81c784);
    }

    /* Valentine's Day */
    .theme-valentines {
      --bg: #fce4ec;
      --card: rgba(255,255,255,0.95);
      --primary: #e91e63;
      --primary-light: #fce4ec;
      --accent: #ad1457;
      --accent-light: #f8bbd0;
      --text: #880e4f;
      --text-light: #c2185b;
      --border: #f48fb1;
      --header-gradient: linear-gradient(135deg, #e91e63, #ad1457);
    }

    /* Bonfire Night */
    .theme-bonfire {
      --bg: #1a1a2e;
      --card: rgba(40,30,20,0.92);
      --primary: #ff5722;
      --primary-light: rgba(255,87,34,0.15);
      --accent: #ff9800;
      --accent-light: rgba(255,152,0,0.15);
      --text: #ffe0b2;
      --text-light: #ffcc80;
      --border: #5d4037;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
      --header-gradient: linear-gradient(135deg, #ff5722, #ff9800);
    }

    /* New Year's */
    .theme-newyear {
      --bg: #0d0d2b;
      --card: rgba(20,20,60,0.92);
      --primary: #ffd700;
      --primary-light: rgba(255,215,0,0.15);
      --accent: #c0c0c0;
      --accent-light: rgba(192,192,192,0.15);
      --text: #f0f0f0;
      --text-light: #c0c0d0;
      --border: #3a3a6a;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
      --header-gradient: linear-gradient(135deg, #ffd700, #c0c0c0);
    }

    /* St Patrick's Day */
    .theme-stpatricks {
      --bg: #e8f5e9;
      --card: rgba(255,255,255,0.95);
      --primary: #2e7d32;
      --primary-light: #c8e6c9;
      --accent: #ffd700;
      --accent-light: #fff9c4;
      --text: #1b5e20;
      --text-light: #4caf50;
      --border: #a5d6a7;
      --header-gradient: linear-gradient(135deg, #2e7d32, #66bb6a);
    }

    /* Thanksgiving */
    .theme-thanksgiving {
      --bg: #fff3e0;
      --card: rgba(255,255,255,0.95);
      --primary: #e65100;
      --primary-light: #ffe0b2;
      --accent: #795548;
      --accent-light: #d7ccc8;
      --text: #3e2723;
      --text-light: #6d4c41;
      --border: #d7ccc8;
      --header-gradient: linear-gradient(135deg, #e65100, #795548);
    }

    /* Summer */
    .theme-summer {
      --bg: #e0f7fa;
      --card: rgba(255,255,255,0.95);
      --primary: #00acc1;
      --primary-light: #b2ebf2;
      --accent: #ff7043;
      --accent-light: #ffccbc;
      --text: #004d40;
      --text-light: #00796b;
      --border: #b2dfdb;
      --header-gradient: linear-gradient(135deg, #00acc1, #ff7043);
    }

    /* Frozen */
    .theme-frozen {
      --bg: #e3f2fd;
      --card: rgba(255,255,255,0.92);
      --primary: #4fc3f7;
      --primary-light: rgba(79,195,247,0.15);
      --accent: #b39ddb;
      --accent-light: rgba(179,157,219,0.15);
      --text: #1a237e;
      --text-light: #5c6bc0;
      --border: #bbdefb;
      --header-gradient: linear-gradient(135deg, #4fc3f7, #b39ddb);
    }

    /* Star Wars */
    .theme-starwars {
      --bg: #0a0a0a;
      --card: rgba(20,20,30,0.95);
      --primary: #ffe81f;
      --primary-light: rgba(255,232,31,0.12);
      --accent: #ff0000;
      --accent-light: rgba(255,0,0,0.12);
      --text: #e0e0e0;
      --text-light: #9e9e9e;
      --border: #333;
      --shadow: 0 2px 12px rgba(0,0,0,0.5);
      --header-gradient: linear-gradient(135deg, #ffe81f, #ff0000);
    }

    /* Princess */
    .theme-princess {
      --bg: #fce4ec;
      --card: rgba(255,255,255,0.95);
      --primary: #ec407a;
      --primary-light: #fce4ec;
      --accent: #ffd700;
      --accent-light: #fff9c4;
      --text: #880e4f;
      --text-light: #c2185b;
      --border: #f8bbd0;
      --header-gradient: linear-gradient(135deg, #ec407a, #ffd700);
    }

    /* Pixar */
    .theme-pixar {
      --bg: #e8eaf6;
      --card: rgba(255,255,255,0.95);
      --primary: #1565c0;
      --primary-light: #bbdefb;
      --accent: #f4511e;
      --accent-light: #ffccbc;
      --text: #1a237e;
      --text-light: #3949ab;
      --border: #c5cae9;
      --header-gradient: linear-gradient(135deg, #1565c0, #f4511e);
    }

    /* Villains */
    .theme-villains {
      --bg: #12002e;
      --card: rgba(30,10,50,0.92);
      --primary: #7b1fa2;
      --primary-light: rgba(123,31,162,0.15);
      --accent: #00e676;
      --accent-light: rgba(0,230,118,0.15);
      --text: #e0e0e0;
      --text-light: #b0b0c0;
      --border: #4a148c;
      --shadow: 0 2px 12px rgba(0,0,0,0.4);
      --header-gradient: linear-gradient(135deg, #7b1fa2, #00e676);
    }

    /* Mickey & Friends */
    .theme-mickey {
      --bg: #fff3e0;
      --card: rgba(255,255,255,0.95);
      --primary: #d32f2f;
      --primary-light: #ffcdd2;
      --accent: #f9a825;
      --accent-light: #fff9c4;
      --text: #1a1a1a;
      --text-light: #616161;
      --border: #ffcdd2;
      --header-gradient: linear-gradient(135deg, #d32f2f, #f9a825);
    }

    /* Moana */
    .theme-moana {
      --bg: #e0f2f1;
      --card: rgba(255,255,255,0.92);
      --primary: #00897b;
      --primary-light: #b2dfdb;
      --accent: #ff8f00;
      --accent-light: #ffe0b2;
      --text: #004d40;
      --text-light: #00796b;
      --border: #b2dfdb;
      --header-gradient: linear-gradient(135deg, #00897b, #ff8f00);
    }

    /* Encanto */
    .theme-encanto {
      --bg: #f3e5f5;
      --card: rgba(255,255,255,0.95);
      --primary: #8e24aa;
      --primary-light: #e1bee7;
      --accent: #ffb300;
      --accent-light: #fff8e1;
      --text: #4a148c;
      --text-light: #7b1fa2;
      --border: #ce93d8;
      --header-gradient: linear-gradient(135deg, #8e24aa, #ffb300);
    }

    /* ============ BASE STYLES ============ */

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      transition: background 0.5s ease, color 0.3s ease;
    }

    /* === TV LAYOUT: fill viewport exactly === */
    .dashboard {
      height: 100vh;
      padding: 12px;
      display: grid;
      grid-template-columns: 220px 1fr 1fr 1fr;
      grid-template-rows: auto auto 1fr 1fr;
      gap: 12px;
      grid-template-areas:
        "sidebar header    header    header"
        "sidebar countdown countdown countdown"
        "sidebar today     upcoming  lists"
        "sidebar meals     meals     reminders";
    }

    /* Cards */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: background 0.3s ease;
    }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-light);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .card-title .icon { font-size: 16px; }

    .card-body {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .card-body::-webkit-scrollbar { width: 3px; }
    .card-body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    /* === SIDEBAR === */
    .sidebar {
      grid-area: sidebar;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .profile-card {
      text-align: center;
      padding: 16px 12px;
      background: var(--header-gradient);
      color: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .profile-card .family-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .profile-card .subtitle {
      font-size: 11px;
      opacity: 0.85;
    }

    .profile-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .clock-card {
      text-align: center;
      padding: 10px;
    }

    .clock-time {
      font-size: 34px;
      font-weight: 200;
      color: var(--primary);
      letter-spacing: -1px;
    }

    .clock-date {
      font-size: 11px;
      color: var(--text-light);
      margin-top: 2px;
    }

    /* === KID POINTS (in sidebar) === */
    .kid-points-card {
      border-radius: var(--radius);
      padding: 14px;
      text-align: center;
      color: white;
      box-shadow: var(--shadow);
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .kid-points-card .kid-sparkles {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
    }

    .kid-points-card .kid-sparkle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      animation: kid-twinkle 2s infinite ease-in-out;
    }

    @keyframes kid-twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(2); }
    }

    .kid-points-card.sam {
      background: linear-gradient(135deg, #11998e, #38ef7d);
    }

    .kid-points-card.robyn {
      background: linear-gradient(135deg, #f093fb, #f5576c);
    }

    .kid-points-card.default-kid {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .kid-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
      position: relative;
    }

    .mickey-heads {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 6px;
      min-height: 28px;
      align-items: center;
      position: relative;
    }

    /* Sam: black Mickey heads */
    .mickey-head {
      width: 28px;
      height: 28px;
      position: relative;
      display: inline-block;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
    }

    .mickey-head .head {
      width: 18px;
      height: 18px;
      background: #1a1a1a;
      border-radius: 50%;
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    .mickey-head .ear-left,
    .mickey-head .ear-right {
      width: 11px;
      height: 11px;
      background: #1a1a1a;
      border-radius: 50%;
      position: absolute;
      top: 0;
    }

    .mickey-head .ear-left { left: 1px; }
    .mickey-head .ear-right { right: 1px; }

    /* Robyn: pink Minnie heads with bow */
    .minnie-head {
      width: 28px;
      height: 30px;
      position: relative;
      display: inline-block;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
    }

    .minnie-head .head {
      width: 18px;
      height: 18px;
      background: #1a1a1a;
      border-radius: 50%;
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    .minnie-head .ear-left,
    .minnie-head .ear-right {
      width: 11px;
      height: 11px;
      background: #1a1a1a;
      border-radius: 50%;
      position: absolute;
      top: 4px;
    }

    .minnie-head .ear-left { left: 1px; }
    .minnie-head .ear-right { right: 1px; }

    .minnie-head .bow {
      position: absolute;
      top: -1px;
      right: -2px;
      width: 16px;
      height: 10px;
      z-index: 1;
    }

    .minnie-head .bow-left,
    .minnie-head .bow-right {
      position: absolute;
      width: 8px;
      height: 6px;
      background: #ff69b4;
      border-radius: 50%;
      top: 0;
    }

    .minnie-head .bow-left { left: 0; transform: rotate(-15deg); }
    .minnie-head .bow-right { right: 0; transform: rotate(15deg); }

    .minnie-head .bow-center {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #ff1493;
      border-radius: 50%;
      top: 1px;
      left: 50%;
      transform: translateX(-50%);
    }

    .points-total {
      font-size: 32px;
      font-weight: 800;
      text-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }

    .points-label {
      font-size: 10px;
      opacity: 0.85;
      margin-top: 1px;
    }

    .points-progress {
      margin-top: 8px;
    }

    .progress-bar-track {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.25);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--mickey-gold);
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .progress-label {
      font-size: 9px;
      opacity: 0.8;
      margin-top: 3px;
    }

    .points-empty-msg {
      font-size: 11px;
      opacity: 0.8;
    }

    /* === WEATHER === */
    .weather-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 10px;
      box-shadow: var(--shadow);
    }

    .weather-title {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-light);
      margin-bottom: 6px;
      text-align: center;
    }

    .weather-days {
      display: flex;
      justify-content: space-between;
      gap: 2px;
    }

    .weather-day {
      flex: 1;
      text-align: center;
    }

    .weather-day-name {
      font-size: 9px;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
    }

    .weather-day-icon {
      font-size: 20px;
      margin: 2px 0;
    }

    .weather-day-temp {
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
    }

    .weather-day-low {
      font-size: 9px;
      color: var(--text-light);
    }

    /* === HEADER === */
    .header {
      grid-area: header;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .header .theme-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 12px;
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 600;
      margin-left: 10px;
    }

    .header .updated {
      font-size: 11px;
      color: var(--text-light);
    }

    .live-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
      margin-right: 4px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* === COUNTDOWN === */
    .countdown-area {
      grid-area: countdown;
      display: flex;
      flex-direction: row;
      gap: 10px;
    }

    .countdown-card {
      flex: 1;
      border-radius: var(--radius);
      padding: 10px 14px;
      text-align: center;
      color: white;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .countdown-card .sparkles {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .countdown-card .sparkle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: sparkle-float 3s infinite ease-in-out;
    }

    @keyframes sparkle-float {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
      50% { transform: translateY(-15px) scale(1.5); opacity: 1; }
    }

    .countdown-title {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 2px;
      position: relative;
    }

    .countdown-days {
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      position: relative;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .countdown-label {
      font-size: 10px;
      font-weight: 500;
      opacity: 0.9;
      margin-top: 1px;
      position: relative;
    }

    .countdown-date {
      font-size: 9px;
      opacity: 0.75;
      margin-top: 2px;
      position: relative;
    }

    .countdown-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      color: var(--text-light);
      font-size: 13px;
    }

    /* Countdown backgrounds */
    .bg-fireworks { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); }
    .bg-castle { background: linear-gradient(135deg, #1b1464, #6c3ec1, #c86dd7); }
    .bg-stars { background: linear-gradient(135deg, #0c0c1d, #1a1a3e, #2d2b55); }
    .bg-rainbow { background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3); }
    .bg-beach { background: linear-gradient(135deg, #0abde3, #48dbfb, #feca57); }
    .bg-party { background: linear-gradient(135deg, #ff6348, #ff9ff3, #feca57, #48dbfb); }

    /* === TODAY === */
    .today-card { grid-area: today; }

    .event-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .event-item:last-child { border-bottom: none; }

    .event-time-badge {
      background: var(--primary-light);
      color: var(--primary);
      font-size: 10px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 6px;
      white-space: nowrap;
      min-width: 65px;
      text-align: center;
    }

    .event-time-badge.all-day {
      background: var(--accent-light);
      color: var(--accent);
    }

    .event-details h3 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 1px;
    }

    .event-details p {
      font-size: 11px;
      color: var(--text-light);
    }

    .empty-state {
      text-align: center;
      padding: 20px 10px;
      color: var(--text-light);
      font-size: 13px;
    }

    .empty-state .icon {
      font-size: 28px;
      margin-bottom: 8px;
      opacity: 0.5;
    }

    /* === UPCOMING === */
    .upcoming-card { grid-area: upcoming; }

    .day-group { margin-bottom: 10px; }
    .day-group:last-child { margin-bottom: 0; }

    .day-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      padding-bottom: 2px;
      border-bottom: 2px solid var(--primary-light);
    }

    .day-event {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 12px;
    }

    .day-event .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
      flex-shrink: 0;
    }

    .day-event .time {
      font-size: 10px;
      color: var(--text-light);
      min-width: 60px;
    }

    /* === MEALS === */
    .meals-card { grid-area: meals; }

    .meal-slot {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }

    .meal-slot:last-child { border-bottom: none; }

    .meal-type-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      min-width: 60px;
      text-align: center;
      text-transform: capitalize;
    }

    .meal-type-breakfast { background: #fff9c4; color: #f57f17; }
    .meal-type-lunch { background: #c8e6c9; color: #2e7d32; }
    .meal-type-dinner { background: #e1bee7; color: #7b1fa2; }
    .meal-type-snack { background: #ffe0b2; color: #e65100; }

    .meal-info h4 {
      font-size: 13px;
      font-weight: 600;
    }

    .meal-info .meal-notes {
      font-size: 10px;
      color: var(--text-light);
      font-style: italic;
    }

    .meal-slot { position: relative; }

    .meal-actions {
      display: flex;
      gap: 4px;
      margin-left: auto;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .meal-slot:hover .meal-actions { opacity: 1; }

    .meal-action-btn {
      background: none;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      padding: 2px 6px;
      font-size: 10px;
      color: var(--text-light);
      opacity: 0.3;
      transition: all 0.15s;
    }

    .meal-action-btn:hover {
      opacity: 1;
      background: var(--primary-light);
      color: var(--primary);
    }

    .meal-action-btn.delete:hover {
      background: #fee;
      color: #c00;
    }

    .card-add-btn {
      display: inline-block;
      margin-left: auto;
      padding: 2px 8px;
      border: 1px dashed var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text-light);
      font-size: 10px;
      cursor: pointer;
      opacity: 0;
      transition: all 0.15s;
    }

    .card:hover .card-add-btn { opacity: 0.5; }

    .card-add-btn:hover {
      opacity: 1 !important;
      color: var(--primary);
      background: var(--primary-light);
      border-color: var(--primary);
    }

    /* Generic modal (shared by meals, events, lists, reminders) */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(2px);
    }

    .modal {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      width: 340px;
      max-width: 90vw;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .modal h3 {
      margin-bottom: 14px;
      color: var(--text);
      font-size: 16px;
    }

    .modal label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .modal input,
    .modal select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
      background: var(--card);
      color: var(--text);
    }

    .modal input:focus,
    .modal select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(74,122,247,0.15);
    }

    .modal-buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .modal-buttons button {
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-cancel {
      background: var(--border);
      color: var(--text);
    }

    .btn-save {
      background: var(--primary);
      color: white;
    }

    .btn-save:hover { filter: brightness(1.1); }
    .btn-cancel:hover { background: #ccc; }

    /* Weekly meal mini view */
    .week-meals-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-top: 8px;
    }

    .week-meal-day {
      text-align: center;
      font-size: 9px;
    }

    .week-meal-day-name {
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .week-meal-item {
      font-size: 9px;
      color: var(--text);
      padding: 2px;
      border-radius: 3px;
      margin-bottom: 1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .week-meal-item.dinner { background: var(--accent-light); }
    .week-meal-item.lunch { background: var(--primary-light); }

    /* === LISTS === */
    .lists-card { grid-area: lists; }

    .list-group { margin-bottom: 10px; }
    .list-group:last-child { margin-bottom: 0; }

    .list-group-name {
      font-size: 10px;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      padding-bottom: 2px;
      border-bottom: 2px solid var(--primary-light);
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 0;
      font-size: 12px;
    }

    .list-item-check {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1.5px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
    }

    .list-item.done .list-item-check {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }

    .list-item.done .list-item-text {
      text-decoration: line-through;
      opacity: 0.5;
    }

    /* === REMINDERS === */
    .reminders-card { grid-area: reminders; }

    .reminder-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px;
      background: var(--primary-light);
      border-radius: 10px;
      margin-bottom: 6px;
    }

    .reminder-item:last-child { margin-bottom: 0; }

    .reminder-icon {
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .reminder-content h4 {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 1px;
    }

    .reminder-content .time {
      font-size: 10px;
      color: var(--text-light);
    }

    /* === MOBILE (scrollable) === */
    @media (max-width: 1100px) {
      html, body { height: auto; overflow: auto; }
      .dashboard {
        height: auto;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto;
        grid-template-areas:
          "header header"
          "countdown countdown"
          "today upcoming"
          "lists meals"
          "reminders reminders";
      }
      .sidebar { display: none; }
    }

    @media (max-width: 700px) {
      body { padding: 8px; }
      .dashboard {
        grid-template-columns: 1fr;
        grid-template-rows: auto;
        grid-template-areas:
          "header"
          "countdown"
          "today"
          "upcoming"
          "lists"
          "meals"
          "reminders";
      }
      .countdown-area { flex-direction: column; }
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      color: var(--text-light);
      font-size: 16px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="dashboard" id="dashboard">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      Loading dashboard...
    </div>
  </div>

  <script>
    const REFRESH_INTERVAL = 60000;
    const POINTS_PER_MICKEY = 20;

    // Theme display names
    const THEME_NAMES = {
      default: 'Default',
      christmas: 'Christmas',
      halloween: 'Halloween',
      easter: 'Easter',
      valentines: "Valentine's Day",
      bonfire: 'Bonfire Night',
      newyear: "New Year's",
      stpatricks: "St Patrick's Day",
      thanksgiving: 'Thanksgiving',
      summer: 'Summer',
      frozen: 'Frozen',
      starwars: 'Star Wars',
      princess: 'Princess',
      pixar: 'Pixar',
      villains: 'Villains',
      mickey: 'Mickey & Friends',
      moana: 'Moana',
      encanto: 'Encanto',
    };

    // Theme emojis for the header badge
    const THEME_EMOJIS = {
      default: '',
      christmas: '\u{1F384}',
      halloween: '\u{1F383}',
      easter: '\u{1F430}',
      valentines: '\u{2764}\u{FE0F}',
      bonfire: '\u{1F386}',
      newyear: '\u{1F389}',
      stpatricks: '\u{2618}\u{FE0F}',
      thanksgiving: '\u{1F983}',
      summer: '\u{2600}\u{FE0F}',
      frozen: '\u{2744}\u{FE0F}',
      starwars: '\u{2B50}',
      princess: '\u{1F451}',
      pixar: '\u{1F3AC}',
      villains: '\u{1F9B9}',
      mickey: '\u{1F42D}',
      moana: '\u{1F30A}',
      encanto: '\u{1F33A}',
    };

    // Wirral coordinates
    const WEATHER_LAT = 53.39;
    const WEATHER_LON = -3.02;
    let cachedWeather = null;
    let lastWeatherFetch = 0;
    const WEATHER_CACHE_MS = 30 * 60 * 1000;

    function weatherEmoji(code) {
      if (code === 0) return '\u2600\uFE0F';
      if (code <= 3) return '\u26C5';
      if (code <= 48) return '\u{1F32B}\uFE0F';
      if (code <= 55) return '\u{1F326}\uFE0F';
      if (code <= 57) return '\u{1F327}\uFE0F';
      if (code <= 65) return '\u{1F327}\uFE0F';
      if (code <= 67) return '\u{1F328}\uFE0F';
      if (code <= 75) return '\u{1F328}\uFE0F';
      if (code <= 77) return '\u{1F328}\uFE0F';
      if (code <= 82) return '\u{1F327}\uFE0F';
      if (code <= 86) return '\u2744\uFE0F';
      if (code <= 99) return '\u26C8\uFE0F';
      return '\u{1F324}\uFE0F';
    }

    async function fetchWeather() {
      const now = Date.now();
      if (cachedWeather && (now - lastWeatherFetch) < WEATHER_CACHE_MS) {
        return cachedWeather;
      }
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${WEATHER_LAT}&longitude=${WEATHER_LON}&daily=weathercode,temperature_2m_max,temperature_2m_min&forecast_days=5&timezone=Europe%2FLondon`;
        const res = await fetch(url);
        if (!res.ok) return null;
        const data = await res.json();
        cachedWeather = data.daily;
        lastWeatherFetch = now;
        return cachedWeather;
      } catch (e) {
        return cachedWeather;
      }
    }

    function renderWeather(weather) {
      if (!weather) return '';
      const days = weather.time.map((date, i) => {
        const d = new Date(date + 'T12:00:00');
        const dayName = i === 0 ? 'Today' : d.toLocaleDateString('en-US', { weekday: 'short' });
        return `
          <div class="weather-day">
            <div class="weather-day-name">${dayName}</div>
            <div class="weather-day-icon">${weatherEmoji(weather.weathercode[i])}</div>
            <div class="weather-day-temp">${Math.round(weather.temperature_2m_max[i])}\u00B0</div>
            <div class="weather-day-low">${Math.round(weather.temperature_2m_min[i])}\u00B0</div>
          </div>
        `;
      });
      return `
        <div class="weather-card">
          <div class="weather-title">Wirral Weather</div>
          <div class="weather-days">${days.join('')}</div>
        </div>
      `;
    }

    function kidColorClass(name) {
      const lower = (name || '').toLowerCase();
      if (lower === 'sam') return 'sam';
      if (lower === 'robyn') return 'robyn';
      return 'default-kid';
    }

    async function fetchData() {
      const params = new URLSearchParams(window.location.search);
      const secret = params.get('secret');
      const res = await fetch(`/api/dashboard?secret=${secret}`);
      if (!res.ok) throw new Error('Failed to load');
      return res.json();
    }

    function applyTheme(theme) {
      const body = document.body;
      // Remove all theme classes
      body.className = body.className.replace(/theme-\S+/g, '').trim();
      if (theme && theme !== 'default') {
        body.classList.add(`theme-${theme}`);
      }
    }

    function renderCountdowns(countdowns) {
      if (!countdowns || countdowns.length === 0) {
        return `<div class="countdown-area"><div class="countdown-empty">No countdowns set</div></div>`;
      }

      return `
        <div class="countdown-area">
          ${countdowns.map(c => `
            <div class="countdown-card bg-${esc(c.background || 'fireworks')}">
              <div class="sparkles">
                ${Array.from({length: 10}, (_, i) => `
                  <div class="sparkle" style="left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${(i*0.3).toFixed(1)}s"></div>
                `).join('')}
              </div>
              <div class="countdown-title">${esc(c.title)}</div>
              <div class="countdown-days">${c.days_until}</div>
              <div class="countdown-label">${c.days_until === 1 ? 'day to go!' : 'days to go!'}</div>
              <div class="countdown-date">${new Date(c.target_date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderMickeyHead() {
      return `
        <div class="mickey-head">
          <div class="ear-left"></div>
          <div class="ear-right"></div>
          <div class="head"></div>
        </div>
      `;
    }

    function renderMinnieHead() {
      return `
        <div class="minnie-head">
          <div class="bow">
            <div class="bow-left"></div>
            <div class="bow-right"></div>
            <div class="bow-center"></div>
          </div>
          <div class="ear-left"></div>
          <div class="ear-right"></div>
          <div class="head"></div>
        </div>
      `;
    }

    function renderKidSparkles() {
      return `
        <div class="kid-sparkles">
          ${Array.from({length: 8}, (_, i) => `
            <div class="kid-sparkle" style="left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${(i*0.35).toFixed(2)}s"></div>
          `).join('')}
        </div>
      `;
    }

    function renderSidebarKidPoints(kidPoints) {
      if (!kidPoints || kidPoints.length === 0) return '';

      return kidPoints.map(kid => {
        const mickeyCount = kid.mickey_heads;
        const progressInCurrentMickey = kid.remaining_points;
        const progressPct = (progressInCurrentMickey / POINTS_PER_MICKEY) * 100;
        const toNext = POINTS_PER_MICKEY - progressInCurrentMickey;
        const isRobyn = (kid.kid_name || '').toLowerCase() === 'robyn';
        const headFn = isRobyn ? renderMinnieHead : renderMickeyHead;
        const emptyMsg = isRobyn ? 'No Minnie Heads yet!' : 'No Mickey Heads yet!';
        const nextLabel = isRobyn ? 'Minnie Head' : 'Mickey Head';

        return `
          <div class="kid-points-card ${kidColorClass(kid.kid_name)}">
            ${renderKidSparkles()}
            <div class="kid-name">${esc(kid.kid_name)}</div>
            <div class="mickey-heads">
              ${mickeyCount > 0
                ? Array.from({length: mickeyCount}, () => headFn()).join('')
                : `<span class="points-empty-msg">${emptyMsg}</span>`}
            </div>
            <div class="points-total">${progressInCurrentMickey}</div>
            <div class="points-label">points</div>
            <div class="points-progress">
              <div class="progress-bar-track">
                <div class="progress-bar-fill" style="width:${progressPct}%"></div>
              </div>
              <div class="progress-label">${toNext} point${toNext !== 1 ? 's' : ''} to next ${nextLabel}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function getSecret() {
      return new URLSearchParams(window.location.search).get('secret');
    }

    function getTodayStr() {
      return new Date().toLocaleDateString('en-CA');
    }

    async function saveMeal({ meal_date, meal_type, title, notes }) {
      const res = await fetch(`/api/meals?secret=${getSecret()}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ meal_date, meal_type, title, notes }),
      });
      if (!res.ok) throw new Error('Failed to save meal');
      return res.json();
    }

    async function saveEvent({ title, starts_at, ends_at, description, all_day }) {
      const res = await fetch(`/api/events?secret=${getSecret()}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, starts_at, ends_at, description, all_day }),
      });
      if (!res.ok) throw new Error('Failed to save event');
      return res.json();
    }

    async function saveListItem(list_name, text) {
      const res = await fetch(`/api/list-items?secret=${getSecret()}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ list_name, text }),
      });
      if (!res.ok) throw new Error('Failed to add list item');
      return res.json();
    }

    async function saveReminder({ message, remind_at }) {
      const res = await fetch(`/api/reminders?secret=${getSecret()}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, remind_at }),
      });
      if (!res.ok) throw new Error('Failed to save reminder');
      return res.json();
    }

    async function deleteMeal(meal_date, meal_type) {
      const res = await fetch(`/api/meals?secret=${getSecret()}`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ meal_date, meal_type }),
      });
      if (!res.ok) throw new Error('Failed to delete meal');
      return res.json();
    }

    function openMealModal({ date, type, title, notes } = {}) {
      const isEdit = Boolean(title);
      const todayStr = getTodayStr();
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="meal-modal">
          <h3>${isEdit ? 'Edit Meal' : 'Add Meal'}</h3>
          <label>Date</label>
          <input type="date" id="meal-date" value="${date || todayStr}" min="${todayStr}">
          <label>Meal Type</label>
          <select id="meal-type">
            <option value="breakfast" ${type === 'breakfast' ? 'selected' : ''}>Breakfast</option>
            <option value="lunch" ${type === 'lunch' ? 'selected' : ''}>Lunch</option>
            <option value="dinner" ${type === 'dinner' ? 'selected' : ''}>Dinner</option>
            <option value="snack" ${type === 'snack' ? 'selected' : ''}>Snack</option>
          </select>
          <label>Title</label>
          <input type="text" id="meal-title" value="${esc(title || '')}" placeholder="e.g. Spaghetti Bolognese">
          <label>Notes (optional)</label>
          <input type="text" id="meal-notes-input" value="${esc(notes || '')}" placeholder="e.g. with garlic bread">
          <div class="modal-buttons">
            <button class="btn-cancel" id="meal-cancel">Cancel</button>
            <button class="btn-save" id="meal-save">Save</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);

      overlay.querySelector('#meal-cancel').onclick = () => overlay.remove();
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

      overlay.querySelector('#meal-save').onclick = async () => {
        const meal_date = overlay.querySelector('#meal-date').value;
        const meal_type = overlay.querySelector('#meal-type').value;
        const titleVal = overlay.querySelector('#meal-title').value.trim();
        if (!titleVal) { overlay.querySelector('#meal-title').focus(); return; }
        try {
          await saveMeal({ meal_date, meal_type, title: titleVal, notes: overlay.querySelector('#meal-notes-input').value.trim() || null });
          overlay.remove();
          refreshDashboard();
        } catch (err) {
          console.error(err);
        }
      };

      setTimeout(() => overlay.querySelector('#meal-title').focus(), 50);
    }

    async function handleDeleteMeal(date, type) {
      try {
        await deleteMeal(date, type);
        refreshDashboard();
      } catch (err) {
        console.error(err);
      }
    }

    function openEventModal() {
      const todayStr = getTodayStr();
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal">
          <h3>Add Event</h3>
          <label>Title</label>
          <input type="text" id="evt-title" placeholder="e.g. Swimming lesson">
          <label>Date</label>
          <input type="date" id="evt-date" value="${todayStr}" min="${todayStr}">
          <label>Time (optional)</label>
          <input type="time" id="evt-time">
          <label style="display:flex;align-items:center;gap:6px;text-transform:none;font-size:12px;">
            <input type="checkbox" id="evt-allday"> All day event
          </label>
          <label>Description (optional)</label>
          <input type="text" id="evt-desc" placeholder="Optional details">
          <div class="modal-buttons">
            <button class="btn-cancel" id="evt-cancel">Cancel</button>
            <button class="btn-save" id="evt-save">Save</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      overlay.querySelector('#evt-cancel').onclick = () => overlay.remove();
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
      overlay.querySelector('#evt-save').onclick = async () => {
        const title = overlay.querySelector('#evt-title').value.trim();
        if (!title) { overlay.querySelector('#evt-title').focus(); return; }
        const date = overlay.querySelector('#evt-date').value;
        const time = overlay.querySelector('#evt-time').value;
        const allDay = overlay.querySelector('#evt-allday').checked;
        const desc = overlay.querySelector('#evt-desc').value.trim();
        const starts_at = allDay || !time ? `${date}T00:00:00` : `${date}T${time}:00`;
        try {
          await saveEvent({ title, starts_at, all_day: allDay, description: desc || null });
          overlay.remove();
          refreshDashboard();
        } catch (err) { console.error(err); }
      };
      setTimeout(() => overlay.querySelector('#evt-title').focus(), 50);
    }

    function openListItemModal() {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal">
          <h3>Add List Item</h3>
          <label>List</label>
          <input type="text" id="li-list" value="shopping" placeholder="e.g. shopping, to-do">
          <label>Item</label>
          <input type="text" id="li-text" placeholder="e.g. Milk">
          <div class="modal-buttons">
            <button class="btn-cancel" id="li-cancel">Cancel</button>
            <button class="btn-save" id="li-save">Add</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      overlay.querySelector('#li-cancel').onclick = () => overlay.remove();
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
      overlay.querySelector('#li-save').onclick = async () => {
        const list_name = overlay.querySelector('#li-list').value.trim();
        const text = overlay.querySelector('#li-text').value.trim();
        if (!text) { overlay.querySelector('#li-text').focus(); return; }
        try {
          await saveListItem(list_name || 'shopping', text);
          overlay.remove();
          refreshDashboard();
        } catch (err) { console.error(err); }
      };
      setTimeout(() => overlay.querySelector('#li-text').focus(), 50);
    }

    function openReminderModal() {
      const todayStr = getTodayStr();
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal">
          <h3>Add Reminder</h3>
          <label>Message</label>
          <input type="text" id="rem-msg" placeholder="e.g. Put the bins out">
          <label>Date</label>
          <input type="date" id="rem-date" value="${todayStr}" min="${todayStr}">
          <label>Time</label>
          <input type="time" id="rem-time" value="09:00">
          <div class="modal-buttons">
            <button class="btn-cancel" id="rem-cancel">Cancel</button>
            <button class="btn-save" id="rem-save">Save</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      overlay.querySelector('#rem-cancel').onclick = () => overlay.remove();
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
      overlay.querySelector('#rem-save').onclick = async () => {
        const message = overlay.querySelector('#rem-msg').value.trim();
        if (!message) { overlay.querySelector('#rem-msg').focus(); return; }
        const date = overlay.querySelector('#rem-date').value;
        const time = overlay.querySelector('#rem-time').value || '09:00';
        const remind_at = `${date}T${time}:00`;
        try {
          await saveReminder({ message, remind_at });
          overlay.remove();
          refreshDashboard();
        } catch (err) { console.error(err); }
      };
      setTimeout(() => overlay.querySelector('#rem-msg').focus(), 50);
    }

    // Event delegation for all add/edit/delete buttons
    document.addEventListener('click', (e) => {
      const editBtn = e.target.closest('.meal-edit-btn');
      if (editBtn) {
        openMealModal({
          date: editBtn.dataset.date,
          type: editBtn.dataset.type,
          title: editBtn.dataset.title,
          notes: editBtn.dataset.notes,
        });
        return;
      }
      const delBtn = e.target.closest('.meal-del-btn');
      if (delBtn) {
        handleDeleteMeal(delBtn.dataset.date, delBtn.dataset.type);
        return;
      }
      if (e.target.closest('.meal-add-new')) {
        openMealModal();
        return;
      }
      const addForDate = e.target.closest('.meal-add-for-date');
      if (addForDate) {
        openMealModal({ date: addForDate.dataset.date });
        return;
      }
      if (e.target.closest('.event-add-btn')) {
        openEventModal();
        return;
      }
      if (e.target.closest('.list-add-btn')) {
        openListItemModal();
        return;
      }
      if (e.target.closest('.reminder-add-btn')) {
        openReminderModal();
        return;
      }
    });

    function renderLists(lists) {
      if (!lists || lists.length === 0) {
        return '<div class="empty-state"><div class="icon">&#x1F4CB;</div>No lists yet</div>';
      }
      return lists.map(list => {
        const items = list.items || [];
        if (items.length === 0) return '';
        return `
          <div class="list-group">
            <div class="list-group-name">${esc(list.name)}</div>
            ${items.map(item => `
              <div class="list-item ${item.checked ? 'done' : ''}">
                <div class="list-item-check">${item.checked ? '&#x2713;' : ''}</div>
                <span class="list-item-text">${esc(item.text || item.name)}</span>
              </div>
            `).join('')}
          </div>
        `;
      }).filter(Boolean).join('') || '<div class="empty-state"><div class="icon">&#x1F4CB;</div>No lists yet</div>';
    }

    function renderMeals(meals) {
      const todayMeals = meals?.today || [];
      const weekMeals = meals?.week || [];
      const todayStr = getTodayStr();

      // Group week meals by day, excluding today (shown separately above)
      const weekByDay = {};
      weekMeals.forEach(m => {
        if (m.date === todayStr) return; // skip today — already shown
        if (m.date < todayStr) return;   // skip past days
        if (!weekByDay[m.date]) weekByDay[m.date] = { label: m.day_label, meals: [] };
        weekByDay[m.date].meals.push(m);
      });

      const mealEmojis = {
        breakfast: '\u{1F950}',
        lunch: '\u{1F96A}',
        dinner: '\u{1F35D}',
        snack: '\u{1F36A}',
      };

      let todayHTML = '';
      if (todayMeals.length > 0) {
        todayHTML = todayMeals.map(m => {
          const dataAttrs = `data-date="${todayStr}" data-type="${esc(m.type)}" data-title="${esc(m.title)}" data-notes="${esc(m.notes || '')}"`;
          return `
          <div class="meal-slot">
            <div class="meal-type-badge meal-type-${esc(m.type)}">${mealEmojis[m.type] || ''} ${esc(m.type)}</div>
            <div class="meal-info">
              <h4>${esc(m.title)}</h4>
              ${m.notes ? `<div class="meal-notes">${esc(m.notes)}</div>` : ''}
            </div>
            <div class="meal-actions">
              <button class="meal-action-btn meal-edit-btn" ${dataAttrs}>Edit</button>
              <button class="meal-action-btn delete meal-del-btn" data-date="${todayStr}" data-type="${esc(m.type)}">Del</button>
            </div>
          </div>
        `}).join('');
      } else {
        todayHTML = '<div class="empty-state"><div class="icon">\u{1F37D}\uFE0F</div>No meals planned today</div>';
      }

      todayHTML += `<button class="card-add-btn meal-add-new">+ Add meal</button>`;

      // Week overview (compact) — future days only
      let weekHTML = '';
      const dayEntries = Object.entries(weekByDay);
      if (dayEntries.length > 0) {
        weekHTML = `
          <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border);">
            <div style="font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;margin-bottom:6px;">Coming Up</div>
            ${dayEntries.map(([date, info]) => `
              <div style="display:flex;gap:6px;margin-bottom:4px;font-size:11px;align-items:center;">
                <span style="min-width:65px;color:var(--text-light);font-weight:600;">${esc(info.label)}</span>
                <span style="flex:1">${info.meals.map(m => `${mealEmojis[m.type] || ''} ${esc(m.title)}`).join(' \u00B7 ')}</span>
                <button class="meal-action-btn meal-add-for-date" data-date="${date}" style="opacity:0.3;font-size:10px;padding:1px 5px;border:none;">+</button>
              </div>
            `).join('')}
          </div>
        `;
      }

      return todayHTML + weekHTML;
    }

    function render(data, weather) {
      // Apply theme
      applyTheme(data.theme);

      const themeName = THEME_NAMES[data.theme] || 'Default';
      const themeEmoji = THEME_EMOJIS[data.theme] || '';
      const themeBadge = data.theme && data.theme !== 'default'
        ? `<span class="theme-badge">${themeEmoji} ${esc(themeName)}</span>`
        : '';

      const dashboard = document.getElementById('dashboard');
      dashboard.innerHTML = `
        <!-- Sidebar -->
        <div class="sidebar">
          <div class="profile-card">
            <div class="profile-avatar">&#x1F468;&#x200D;&#x1F469;&#x200D;&#x1F467;&#x200D;&#x1F466;</div>
            <div class="family-name">${esc(data.family_name)}</div>
            <div class="subtitle">Family Dashboard</div>
          </div>

          <div class="card clock-card">
            <div class="clock-time" id="clock"></div>
            <div class="clock-date">${esc(data.today.date)}</div>
          </div>

          ${renderWeather(weather)}

          ${renderSidebarKidPoints(data.kid_points)}
        </div>

        <!-- Header -->
        <div class="header card">
          <h1>Family Dashboard ${themeBadge}</h1>
          <div class="updated">
            <span class="live-dot"></span>
            Updated ${new Date(data.updated_at).toLocaleTimeString()}
          </div>
        </div>

        <!-- Countdowns -->
        ${renderCountdowns(data.countdowns)}

        <!-- Today's Events -->
        <div class="card today-card">
          <div class="card-title"><span class="icon">&#x1F4C5;</span> Today's Schedule <button class="card-add-btn event-add-btn">+ Add</button></div>
          <div class="card-body">
            ${data.today.events.length === 0
              ? '<div class="empty-state"><div class="icon">&#x1F324;&#xFE0F;</div>No events today</div>'
              : data.today.events.map(e => `
                <div class="event-item">
                  <div class="event-time-badge ${e.all_day ? 'all-day' : ''}">${esc(e.starts_at_display)}</div>
                  <div class="event-details">
                    <h3>${esc(e.title)}</h3>
                    ${e.description ? `<p>${esc(e.description)}</p>` : ''}
                  </div>
                </div>
              `).join('')}
          </div>
        </div>

        <!-- Upcoming Week -->
        <div class="card upcoming-card">
          <div class="card-title"><span class="icon">&#x1F5D3;&#xFE0F;</span> Upcoming Week</div>
          <div class="card-body">
            ${data.week.events.length === 0
              ? '<div class="empty-state"><div class="icon">&#x1F4ED;</div>No upcoming events</div>'
              : renderWeekEvents(data.week.events)}
          </div>
        </div>

        <!-- Lists -->
        <div class="card lists-card">
          <div class="card-title"><span class="icon">&#x1F4CB;</span> Lists <button class="card-add-btn list-add-btn">+ Add</button></div>
          <div class="card-body">
            ${renderLists(data.lists)}
          </div>
        </div>

        <!-- Meals -->
        <div class="card meals-card">
          <div class="card-title"><span class="icon">&#x1F37D;&#xFE0F;</span> Meal Planner</div>
          <div class="card-body">
            ${renderMeals(data.meals)}
          </div>
        </div>

        <!-- Reminders -->
        <div class="card reminders-card">
          <div class="card-title"><span class="icon">&#x23F0;</span> Pending Reminders <button class="card-add-btn reminder-add-btn">+ Add</button></div>
          <div class="card-body">
            ${data.reminders.length === 0
              ? '<div class="empty-state"><div class="icon">&#x2705;</div>No pending reminders</div>'
              : data.reminders.map(r => `
                <div class="reminder-item">
                  <div class="reminder-icon">&#x1F514;</div>
                  <div class="reminder-content">
                    <h4>${esc(r.message)}</h4>
                    <div class="time">${esc(r.remind_at_display)}</div>
                  </div>
                </div>
              `).join('')}
          </div>
        </div>
      `;

      updateClock();
    }

    function renderWeekEvents(events) {
      const byDay = {};
      events.forEach(e => {
        if (!byDay[e.day_label]) byDay[e.day_label] = [];
        byDay[e.day_label].push(e);
      });

      return Object.entries(byDay).map(([day, evts]) => `
        <div class="day-group">
          <div class="day-label">${esc(day)}</div>
          ${evts.map(e => `
            <div class="day-event">
              <div class="dot"></div>
              <span class="time">${esc(e.starts_at_display)}</span>
              <span>${esc(e.title)}</span>
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    function esc(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function updateClock() {
      const el = document.getElementById('clock');
      if (!el) return;
      const now = new Date();
      el.textContent = now.toLocaleTimeString('en-US', {
        hour: '2-digit',
        minute: '2-digit',
        hour12: true,
      });
    }

    function startBackgroundMusic() {
      if (window.innerWidth <= 1100) return;
      const existing = document.getElementById('bg-music');
      if (existing) return;
      const iframe = document.createElement('iframe');
      iframe.id = 'bg-music';
      iframe.src = 'https://www.youtube.com/embed/ieYJ5Rux4j4?autoplay=1&loop=1&playlist=ieYJ5Rux4j4&controls=0&showinfo=0&modestbranding=1';
      iframe.allow = 'autoplay';
      iframe.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;border:none;pointer-events:none;';
      document.body.appendChild(iframe);
    }

    async function refreshDashboard() {
      try {
        const [data, weather] = await Promise.all([fetchData(), fetchWeather()]);
        render(data, weather);
      } catch (e) { /* silently retry */ }
    }

    window.refreshDashboard = refreshDashboard;

    async function init() {
      try {
        await refreshDashboard();
        startBackgroundMusic();
      } catch (err) {
        document.getElementById('dashboard').innerHTML =
          '<div class="loading">Failed to load dashboard. Check your URL.</div>';
      }

      setInterval(refreshDashboard, REFRESH_INTERVAL);
      setInterval(updateClock, 1000);
    }

    init();
  </script>
</body>
</html>
