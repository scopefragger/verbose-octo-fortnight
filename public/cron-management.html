<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Automated Tasks</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 24px 20px 48px;
  }

  header {
    max-width: 900px;
    margin: 0 auto 32px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: #f8fafc;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #64748b;
  }

  .refresh-note {
    margin-left: auto;
    font-size: 0.78rem;
    color: #475569;
  }

  .grid {
    max-width: 900px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
  }

  .card {
    background: #1e2330;
    border: 1px solid #2d3748;
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .health-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .health-dot.green  { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
  .health-dot.yellow { background: #eab308; box-shadow: 0 0 6px #eab30888; }
  .health-dot.red    { background: #ef4444; box-shadow: 0 0 6px #ef444488; }
  .health-dot.unknown{ background: #475569; }

  .label {
    font-weight: 600;
    font-size: 0.98rem;
    color: #f1f5f9;
    flex: 1;
  }

  .enabled-badge {
    font-size: 0.72rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .enabled-badge.on  { background: #14532d; color: #4ade80; }
  .enabled-badge.off { background: #450a0a; color: #f87171; }

  .description {
    font-size: 0.83rem;
    color: #94a3b8;
    line-height: 1.5;
  }

  .last-run {
    font-size: 0.82rem;
    color: #64748b;
  }
  .last-run .run-time { color: #cbd5e1; }
  .last-run .run-error { color: #f87171; }

  .loading-msg, .error-msg {
    max-width: 900px;
    margin: 60px auto;
    text-align: center;
    color: #475569;
    font-size: 0.95rem;
  }
  .error-msg { color: #f87171; }
</style>
</head>
<body>

<header>
  <h1>Automated Tasks</h1>
  <span class="subtitle">Read-only view &mdash; refreshes every 60s</span>
  <span class="refresh-note" id="last-updated"></span>
</header>

<div id="container">
  <p class="loading-msg">Loading&hellip;</p>
</div>

<script>
const secret = new URLSearchParams(location.search).get('secret') || '';

function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function relativeTime(isoStr) {
  if (!isoStr) return null;
  const diff = (Date.now() - new Date(isoStr).getTime()) / 1000;
  if (diff < 60)    return 'just now';
  if (diff < 3600)  return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  const days = Math.floor(diff / 86400);
  if (days === 1)   return 'yesterday';
  if (days < 7)     return `${days} days ago`;
  return new Date(isoStr).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function plainTime(isoStr) {
  if (!isoStr) return null;
  return new Date(isoStr).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

function plainDay(isoStr) {
  if (!isoStr) return null;
  const d = new Date(isoStr);
  const now = new Date();
  const isToday = d.toDateString() === now.toDateString();
  const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
  const isYesterday = d.toDateString() === yesterday.toDateString();
  if (isToday)     return `today at ${plainTime(isoStr)}`;
  if (isYesterday) return `yesterday at ${plainTime(isoStr)}`;
  return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'short' })
    + ` at ${plainTime(isoStr)}`;
}

function renderLastRun(cron) {
  const lr = cron.last_run;
  if (!lr) return '<span>Never run</span>';

  if (lr.status === 'running') {
    return `<span class="run-time">Running now&hellip; (started ${relativeTime(lr.started_at)})</span>`;
  }

  if (lr.status === 'error') {
    const msg = esc(lr.error_message || 'unknown error');
    return `<span class="run-error">Failed ${plainDay(lr.started_at)} &mdash; ${msg}</span>`;
  }

  return `<span class="run-time">Last ran ${plainDay(lr.started_at)}</span>`;
}

function renderCard(cron) {
  const dot = `<span class="health-dot ${esc(cron.health)}"></span>`;
  const badge = `<span class="enabled-badge ${cron.enabled ? 'on' : 'off'}">${cron.enabled ? 'Active' : 'Paused'}</span>`;
  return `
    <div class="card">
      <div class="card-header">
        ${dot}
        <span class="label">${esc(cron.human_label)}</span>
        ${badge}
      </div>
      <p class="description">${esc(cron.description)}</p>
      <p class="last-run">${renderLastRun(cron)}</p>
    </div>`;
}

async function load() {
  const url = `/api/cron/status${secret ? `?secret=${encodeURIComponent(secret)}` : ''}`;
  try {
    const res = await fetch(url, { credentials: 'include' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const crons = await res.json();

    const container = document.getElementById('container');
    if (!crons.length) {
      container.innerHTML = '<p class="loading-msg">No automated tasks found. They will appear here after the server restarts.</p>';
      return;
    }
    container.innerHTML = `<div class="grid">${crons.map(renderCard).join('')}</div>`;

    const now = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('last-updated').textContent = `Updated ${now}`;
  } catch (err) {
    document.getElementById('container').innerHTML =
      `<p class="error-msg">Could not load task status: ${esc(err.message)}</p>`;
  }
}

load();
setInterval(load, 60_000);
</script>
</body>
</html>
